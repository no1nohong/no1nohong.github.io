            }
            contextMenu.classList.remove('show');
        };

        document.getElementById('ctxRestore').onclick = () => {
            if (!contextTarget || !contextTarget.isTrash) return;
            const { type, id } = contextTarget;
            if (type === 'file') {
                restoreFromTrash(id);
            } else if (type === 'folder') {
                // Restore all notes in this trash folder
                const folderIds = new Set();
                const collectTrashFolderIds = (fid) => {
                    folderIds.add(fid);
                    deletedFolders.filter(f => f.parentId === fid).forEach(f => collectTrashFolderIds(f.id));
                };
                collectTrashFolderIds(id);
                const notesToRestore = deletedNotes.filter(n => n.folderId && folderIds.has(n.folderId)).map(n => n.id);
                notesToRestore.forEach(nId => restoreFromTrash(nId));
            }
            contextMenu.classList.remove('show');
        };

        function startRename(type, id) {
            // Select correct element based on ID type
            let textEl;
            if (type === 'file') {
                textEl = document.querySelector(`#file-${id} .item-text`);
            } else {
                // Folder: use data attribute selector works for both simple and compound IDs
                textEl = document.querySelector(`[data-folder-id="${id}"] .item-text`);
            }

            if (!textEl) return;

            const currentText = textEl.innerText;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'rename-input';
            input.value = currentText;
            textEl.style.display = 'none';
            textEl.parentNode.insertBefore(input, textEl);
            input.focus();

            const commitRename = () => {
                const newName = input.value.trim();
                if (newName && newName !== currentText) {
                    if (type === 'file') {
                        const note = noteById.get(id);
                        if (note) note.customTitle = newName;
                    } else if (folderById.has(id)) {
                        // Custom folder ->rename directly
                        const folder = folderById.get(id);
                        if (folder) folder.name = newName;
                    } else {
                        // Temporal folder ->use alias
                        folderAliases[id] = newName;
                    }
                    saveData();
                }
                renderSidebar();
            };
            input.addEventListener('blur', commitRename);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
        }

        document.getElementById('ctxRename').onclick = () => {
            if (!contextTarget) return;
            const { type, id } = contextTarget;
            contextMenu.classList.remove('show');
            startRename(type, id);
        };

        function toggleBookmark(e, type, id) {
            e.stopPropagation();
            if (type === 'file') {
                const note = noteById.get(id);
                if (note) note.isBookmarked = !note.isBookmarked;
            } else {
                const notesInFolder = getNotesInFolder(id);
                const anyUnbookmarked = notesInFolder.some(n => !n.isBookmarked);
                notesInFolder.forEach(n => n.isBookmarked = anyUnbookmarked);
                // Toggle custom folder's own bookmark
                if (folderById.has(id)) {
                    const folder = folderById.get(id);
                    folder.isBookmarked = anyUnbookmarked;
                }
            }
            saveData();

            // Pulse animation on star button
            const starEl = e.target.closest('.star-btn');
            if (starEl) {
                starEl.classList.remove('pulse');
                void starEl.offsetWidth; // reflow
                starEl.classList.add('pulse');
                starEl.addEventListener('animationend', () => starEl.classList.remove('pulse'), { once: true });
            }

            // Snapshot open states (using whatever IDs are currently in the DOM)
            document.querySelectorAll('.tree-item.open').forEach(el => {
                const folderId = el.querySelector('.tree-header').getAttribute('data-folder-id');
                if (folderId) openFolders.add(folderId);
            });
            renderSidebar();
        }

        function getNotesInFolder(folderId) {
            if (folderById.has(folderId)) return notesByFolderId.get(folderId) || [];
            return notesByDate.get(folderId) || [];
        }

        function addNoteToFolder(folderId, folderType) {
            const now = new Date();
            let newTimestamp = now.getTime();
            let noteFolderId = null;

            if (folderType === 'custom') {
                noteFolderId = folderId;
            } else if (folderType === 'date') {
                noteFolderId = 'date:' + folderId;
            }

            const newNote = {
                id: newTimestamp,
                timestamp: newTimestamp,
                content: "",
                customTitle: null,
                isBookmarked: false,
                folderId: noteFolderId,
                anchoredDateKey: null,
                anchorOriginFolderId: null,
                _contentLoaded: true
            };

            notes.unshift(newNote);

            // Clear search/filter so the new note is visible
            if (searchQuery || filterBookmarked) {
                searchQuery = "";
                searchInput.value = "";
                filterBookmarked = false;
                filterBtn.classList.remove('active');
            }

            if (noteFolderId && noteFolderId.startsWith('date:')) {
                // Date-level note: just open the date folder
                openFolders.add(noteFolderId.substring(5));
            } else if (noteFolderId) {
                // Open custom folder chain
                let fid = noteFolderId;
                while (fid) {
                    openFolders.add(fid);
                    const f = folderById.get(fid);
                    fid = f ? f.parentId : null;
                }
            } else {
                // Open temporal folders (month + day)
                const d = new Date(newTimestamp);
                const dateKey = d.toLocaleDateString('en-CA');
                openFolders.add(getMonthKey(dateKey));
                openFolders.add(dateKey);
            }

            justCreatedNoteId = newNote.id;
            saveNoteContent(newNote);
            saveData();
            indexAdd(newNote);
            renderSidebar();
            loadNote(newNote.id);
        }

        function clearAllDragOver() {
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function highlightDropTargets(dragType) {
            let selector = '';
            if (dragType === 'note') {
                selector = '[data-drop-type="date"], [data-drop-type="month"], [data-drop-type="custom"]';
            } else if (dragType === 'customFolder') {
                selector = '[data-drop-type="custom"]';
            }
            if (selector) {
                document.querySelectorAll(selector).forEach(el => el.classList.add('drop-target'));
            }
        }

        function clearDropTargets() {
            document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
        }

        function attachTodayDropHandlers(element) {
            element.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                element.classList.add('drag-over');
            });
            element.addEventListener('dragleave', () => {
                element.classList.remove('drag-over');
            });
            element.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                element.classList.remove('drag-over');
                try {
                    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                    const todayKey = new Date().toLocaleDateString('en-CA');
                    handleDrop(data, todayKey, 'date');
                } catch (err) { }
            });
        }

        function handleDrop(data, targetId, targetType) {
            if (data.type === 'note') {
                // Handle bulk move if noteIds array present
                const ids = Array.isArray(data.noteIds) && data.noteIds.length > 0 ? data.noteIds : [data.noteId];
                ids.forEach(nId => handleNoteDropCore(nId, targetId, targetType));
                clearSelection();
                saveData();
                rebuildIndexes();
                renderSidebar();
                return;
            } else if (data.type === 'customFolder') {
                handleCustomFolderDrop(data.folderId, targetId, targetType);
            }
        }

        function handleNoteDropCore(noteId, targetId, targetType) {
            const note = noteById.get(noteId);
            if (!note || isAnchoredNote(note)) return;

            if (targetType === 'custom') {
                if (note.folderId === targetId) return;
                note.folderId = targetId;
                let fid = targetId;
                while (fid) {
                    openFolders.add(fid);
                    const f = folderById.get(fid);
                    fid = f ? f.parentId : null;
                }
            } else if (targetType === 'date') {
                const newFolderId = 'date:' + targetId;
                if (note.folderId === newFolderId) return;
                note.folderId = newFolderId;
                openFolders.add(targetId);
            }
        }

        function handleNoteDrop(noteId, targetId, targetType) {
            const note = noteById.get(noteId);
            const oldFolderId = note ? note.folderId : null;
            const oldTimestamp = note ? note.timestamp : 0;
            handleNoteDropCore(noteId, targetId, targetType);
            if (note) indexUpdate(note, oldFolderId, oldTimestamp);
            saveData();
            renderSidebar();
        }

        function handleCustomFolderDrop(sourceFolderId, targetId, targetType) {
            const folder = folderById.get(sourceFolderId);
            if (!folder) return;

            const oldParentId = folder.parentId;

            if (targetType === 'custom') {
                // Move folder into another custom folder
                if (sourceFolderId === targetId) return;
                // Prevent circular: don't allow dropping into own descendant
                let fid = targetId;
                while (fid) {
                    if (fid === sourceFolderId) return;
                    const f = folderById.get(fid);
                    fid = f ? f.parentId : null;
                }
                folder.parentId = targetId;
            } else {
                // Drop on root area or temporal folder ->move to root
                folder.parentId = null;
            }

            // Update folder index (re-parent)
            const oldPid = oldParentId || '__root__';
            const newPid = folder.parentId || '__root__';
            _mapRemove(childFolders, oldPid, folder.id);
            _mapPush(childFolders, newPid, folder);

            saveData();
            renderSidebar();
        }

        function formatTime12h(date, includeSeconds) {
            let hours = date.getHours();
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12 || 12;
            const h = String(hours).padStart(2, '0');
            if (includeSeconds) return h + ':' + minutes + ':' + seconds + ampm;
            return h + ':' + minutes + ampm;
        }

        function getNoteTitle(note) {
            if (note.customTitle) return note.customTitle;
            ensureContentLoaded(note);
            if (!note.content.trim()) return formatTime12h(new Date(note.timestamp), true);
            let title = note.content.replace(/\n/g, ' ').substring(0, 22);
            if (note.content.length > 22) title += "...";
            return title;
        }

        // --- Rendering ---
        function renderSidebar() {
            fileTree.innerHTML = '';

            let displayNotes = notes;
            if (filterBookmarked) displayNotes = displayNotes.filter(n => n.isBookmarked);

            if (searchQuery) {
                displayNotes = displayNotes.filter(n => {
                    const title = getNoteTitle(n).toLowerCase();
                    ensureContentLoaded(n);
                    const content = n.content.toLowerCase();

                    // Check temporal folder keys and aliases
                    const d = new Date(n.timestamp);
                    const dateKey = d.toLocaleDateString('en-CA');
                    const monthKey = getMonthKey(dateKey);
                    const dateAlias = (folderAliases[dateKey] || "").toLowerCase();
                    const monthAlias = (folderAliases[monthKey] || "").toLowerCase();

                    // Check custom folder name
                    let folderName = "";
                    if (n.folderId) {
                        const f = folderById.get(n.folderId);
                        if (f) folderName = f.name.toLowerCase();
                    }

                    return title.includes(searchQuery) ||
                        content.includes(searchQuery) ||
                        dateKey.includes(searchQuery) ||
                        monthKey.includes(searchQuery) ||
                        dateAlias.includes(searchQuery) ||
                        monthAlias.includes(searchQuery) ||
                        folderName.includes(searchQuery);
                });
            }

            // Also check if folders themselves match search (to show empty matching folders)
            const hasDisplayContent = displayNotes.length > 0 || folders.length > 0;

            if (!hasDisplayContent) {
                if (searchQuery || filterBookmarked) {
                    fileTree.innerHTML = `<div style="padding:20px; color:#555; text-align:center; font-size:12px">No matches</div>`;
                } else {
                    fileTree.innerHTML = `<div class="empty-state"><div class="flag-art">  [ ]\n  [ ]\n  [ ]\n  [ ]\n  [ ]\n  [_]</div><div class="hint">type to begin...</div></div>`;
                }
                return;
            }

            const containsCurrent = (noteList) => {
                return currentNoteId && noteList.some(n => n.id === currentNoteId);
            };

            const fragment = document.createDocumentFragment();
            const displayNoteIds = new Set(displayNotes.map(n => n.id));

            // --- 1. Render custom root-level folders ---
            const rootFolders = (childFolders.get('__root__') || []).slice().sort((a, b) => a.name.localeCompare(b.name));
            rootFolders.forEach(folder => {
                const folderEl = renderCustomFolder(folder, displayNoteIds, containsCurrent);
                if (folderEl) fragment.appendChild(folderEl);
            });

            // --- 2. Render temporal + date-level notes (month → day → note) ---
            const temporalNotes = displayNotes.filter(n => !n.folderId);
            const dateLevelNotes = displayNotes.filter(n => isDateLevelNote(n));

            // Group temporal notes by date only
            const notesByDay = {};
            temporalNotes.forEach(note => {
                const dateKey = new Date(note.timestamp).toLocaleDateString('en-CA');
                if (!notesByDay[dateKey]) notesByDay[dateKey] = [];
                notesByDay[dateKey].push(note);
            });

            // Group date-level notes by date
            const dateLevelByDate = {};
            dateLevelNotes.forEach(note => {
                const dateKey = note.folderId.substring(5);
                if (!dateLevelByDate[dateKey]) dateLevelByDate[dateKey] = [];
                dateLevelByDate[dateKey].push(note);
            });

            const todayKey = new Date().toLocaleDateString('en-CA');
            const todayMonthKey = getMonthKey(todayKey);

            // Collect all dateKeys that have notes, group by month
            const allDateKeys = new Set([...Object.keys(notesByDay), ...Object.keys(dateLevelByDate)]);
            const dateKeysByMonth = {};
            allDateKeys.forEach(dk => {
                const mk = getMonthKey(dk);
                if (!dateKeysByMonth[mk]) dateKeysByMonth[mk] = [];
                dateKeysByMonth[mk].push(dk);
            });
            const monthKeys = Object.keys(dateKeysByMonth).sort().reverse();
            monthKeys.forEach(mk => dateKeysByMonth[mk].sort().reverse());

            // Display helpers
            function getMonthDisplayName(monthKey) {
                if (folderAliases[monthKey]) return folderAliases[monthKey];
                const [year, month] = monthKey.split('-');
                const date = new Date(parseInt(year), parseInt(month) - 1, 1);
                return date.toLocaleString('en-US', { month: 'long' }).toLowerCase() + ' ' + year;
            }

            function getDayDisplayName(dateKey) {
                if (folderAliases[dateKey]) return folderAliases[dateKey];
                const d = new Date(dateKey + 'T12:00:00');
                const dayName = d.toLocaleString('en-US', { weekday: 'short' }).toLowerCase();
                return dayName + ' ' + d.getDate();
            }

            // Helper: render a day folder with notes inside
            function renderDayFolder(dateKey, isToday) {
                const dayNotes = notesByDay[dateKey] || [];
                const directNotes = dateLevelByDate[dateKey] || [];
                const allDayNotes = [...dayNotes, ...directNotes];

                const isDayParentActive = containsCurrent(allDayNotes);
                const isDayBookmarked = allDayNotes.length > 0 && allDayNotes.every(n => n.isBookmarked);
                const isOpen = openFolders.has(dateKey) || searchQuery.length > 0 || filterBookmarked;
                const dayFolder = createFolder(dateKey, getDayDisplayName(dateKey), 'date', isOpen, isDayBookmarked, isDayParentActive, allDayNotes.length);

                // Add "today" label inline after the day name text
                if (isToday) {
                    const header = dayFolder.querySelector('.tree-header');
                    const itemText = header.querySelector('.item-text');
                    const todayEl = document.createElement('span');
                    todayEl.className = 'today-label';
                    todayEl.textContent = ' today';
                    itemText.appendChild(todayEl);
                    if (!isMobileDevice) attachTodayDropHandlers(header);
                }

                dayFolder.classList.add('sub-folder');

                if (!isOpen) return dayFolder;
                const children = dayFolder.querySelector('.tree-children');

                // Anchored notes first (no time prefix), then unanchored sorted newest-first
                const anchored = allDayNotes.filter(n => isAnchoredNote(n));
                const unanchored = allDayNotes.filter(n => !isAnchoredNote(n));
                unanchored.sort((a, b) => b.timestamp - a.timestamp);

                anchored.forEach(note => children.appendChild(createFileItem(note, false)));
                unanchored.forEach(note => {
                    const isDateLevel = note.folderId && note.folderId.startsWith('date:');
                    children.appendChild(createFileItem(note, !isDateLevel));
                });

                return dayFolder;
            }

            // Helper: render a month folder
            function renderMonthFolder(monthKey, dayKeys) {
                const allMonthNotes = dayKeys.flatMap(dk => [...(notesByDay[dk] || []), ...(dateLevelByDate[dk] || [])]);
                const isMonthParentActive = containsCurrent(allMonthNotes);
                const isMonthBookmarked = allMonthNotes.length > 0 && allMonthNotes.every(n => n.isBookmarked);
                const isOpen = openFolders.has(monthKey) || searchQuery.length > 0 || filterBookmarked;
                const monthFolder = createFolder(monthKey, getMonthDisplayName(monthKey), 'month', isOpen, isMonthBookmarked, isMonthParentActive, allMonthNotes.length);

                if (!isOpen) return monthFolder;
                const children = monthFolder.querySelector('.tree-children');

                // For the current month, ensure today's dateKey is included even if empty
                const isTodayMonth = monthKey === todayMonthKey;
                const dayKeysToRender = isTodayMonth && !dayKeys.includes(todayKey)
                    ? [todayKey, ...dayKeys]
                    : dayKeys;

                dayKeysToRender.forEach(dk => {
                    children.appendChild(renderDayFolder(dk, dk === todayKey));
                });

                return monthFolder;
            }

            // Render month folders (newest first)
            monthKeys.forEach(monthKey => {
                fragment.appendChild(renderMonthFolder(monthKey, dateKeysByMonth[monthKey]));
            });

            // If today's month has no notes yet, still render it
            if (!dateKeysByMonth[todayMonthKey]) {
                if (!openFolders.has(todayMonthKey) && !searchQuery && !filterBookmarked) {
                    openFolders.add(todayMonthKey);
                }
                fragment.appendChild(renderMonthFolder(todayMonthKey, []));
            }

            fileTree.appendChild(fragment);
            focusedItemIndex = -1;
            document.querySelectorAll('.focused').forEach(el => el.classList.remove('focused'));
            updateBulkBar();

            // Scroll to active note
            requestAnimationFrame(() => {
                const activeEl = fileTree.querySelector('.file-item.active');
                if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            });
        }

        function renderCustomFolder(folder, displayNoteIds, containsCurrent) {
            const folderNotes = (notesByFolderId.get(folder.id) || []).filter(n => displayNoteIds.has(n.id));
            const subFolders = (childFolders.get(folder.id) || []).slice().sort((a, b) => a.name.localeCompare(b.name));

            // Skip empty folders during search/filter (unless folder itself has content)
            if ((searchQuery || filterBookmarked) && folderNotes.length === 0 && subFolders.length === 0) {
                return null;
            }

            const allNotes = folderNotes;
            const isParentActive = containsCurrent(allNotes);
            const isBookmarked = folder.isBookmarked || false;
            const isOpen = openFolders.has(folder.id) || searchQuery.length > 0 || filterBookmarked /*|| isParentActive*/;

            const folderEl = createFolder(folder.id, folder.name, 'custom', isOpen, isBookmarked, isParentActive, folderNotes.length);

            // Skip rendering children if folder is closed (major perf win at scale)
            if (!isOpen) return folderEl;

            const children = folderEl.querySelector('.tree-children');

            // Render child notes — anchored first, then by timestamp
            const anchoredFolderNotes = folderNotes.filter(n => isAnchoredNote(n));
            const unanchoredFolderNotes = folderNotes.filter(n => !isAnchoredNote(n));
            unanchoredFolderNotes.sort((a, b) => b.timestamp - a.timestamp);
            anchoredFolderNotes.forEach(note => children.appendChild(createFileItem(note)));
            unanchoredFolderNotes.forEach(note => children.appendChild(createFileItem(note)));

            // Render nested subfolders
            subFolders.forEach(sub => {
                const subEl = renderCustomFolder(sub, displayNoteIds, containsCurrent);
                if (subEl) {
                    subEl.classList.add('sub-folder');
                    children.appendChild(subEl);
                }
            });

            return folderEl;
        }

        function createFolder(id, displayName, type, isOpen, isBookmarked, isActiveParent, noteCount) {
            const container = document.createElement('div');
            container.className = `tree-item ${isOpen ? 'open' : ''} ${isActiveParent ? 'active-parent' : ''}`;

            const header = document.createElement('div');
            header.className = 'tree-header';
            // ID here can be simple (Date) or compound (Time)
            header.setAttribute('data-folder-id', id);
            header.setAttribute('data-drop-type', type);
            header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');

            const countBadge = noteCount > 0 ? `<span class="folder-count">${noteCount}</span>` : '';
            header.innerHTML = `
                <span class="arrow">&#9654;</span>
                <span class="item-text">${escapeHTML(displayName)}</span>${countBadge}
                <div class="item-controls">
                    <span class="control-btn menu">&#8942;</span>
                </div>
                <span class="star-btn ${isBookmarked ? 'is-active' : ''}">&#9733;</span>
            `;

            header.onclick = (e) => {
                if (!e.target.classList.contains('control-btn') && !e.target.classList.contains('star-btn')) {
                    const isOpen = container.classList.contains('open');
                    if (isOpen) { openFolders.delete(id); } else { openFolders.add(id); }
                    // Re-render sidebar to populate/clear children (skip-closed optimization)
                    renderSidebar();
                }
            };
            header.querySelector('.star-btn').onclick = (e) => toggleBookmark(e, 'folder', id);
            header.querySelector('.menu').onclick = (e) => showContextMenu(e, 'folder', id);
            header.addEventListener('contextmenu', (e) => showContextMenu(e, 'folder', id));
            // Double-click to rename custom folders
            if (type === 'custom') {
                header.querySelector('.item-text').addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    startRename('folder', id);
                });
            }

            // "+" button on ALL folder types
            const controls = header.querySelector('.item-controls');
            const addBtn = document.createElement('span');
            //addBtn.className = 'control-btn add-note';
            //addBtn.textContent = '+note';
            //addBtn.title = 'new note';
            //addBtn.onclick = (e) => {
            //    e.stopPropagation();
            //    addNoteToFolder(id, type);
            //};
            //controls.insertBefore(addBtn, controls.firstChild);

            if (!isMobileDevice) {
                // Drag: only custom folders are draggable
                if (type === 'custom') {
                    header.setAttribute('draggable', 'true');
                    header.addEventListener('dragstart', (e) => {
                        e.stopPropagation();
                        const dragType = 'customFolder';
                        e.dataTransfer.setData('text/plain', JSON.stringify({
                            type: dragType,
                            folderId: id
                        }));
                        e.dataTransfer.effectAllowed = 'move';
                        container.style.opacity = '0.5';
                        highlightDropTargets(dragType);
                    });
                    header.addEventListener('dragend', () => {
                        container.style.opacity = '1';
                        clearAllDragOver();
                        clearDropTargets();
                    });
                }

                // Drop: all folders are drop targets
                header.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    header.classList.add('drag-over');
                });
                header.addEventListener('dragleave', () => {
                    header.classList.remove('drag-over');
                });
                header.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    header.classList.remove('drag-over');
                    try {
                        const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                        handleDrop(data, id, type);
                    } catch (err) { }
                });
            } else {
                // Mobile: long-press opens context menu
                attachLongPress(header, (e) => showContextMenu(e, 'folder', id));
            }

            const children = document.createElement('div');
            children.className = 'tree-children';
            container.appendChild(header);
            container.appendChild(children);

            // Fade-in animation for newly created folders
            if (id === justCreatedFolderId) {
                container.classList.add('sidebar-fade-in');
                container.addEventListener('animationend', () => container.classList.remove('sidebar-fade-in'), { once: true });
                justCreatedFolderId = null;
            }

            return container;
        }

        function createFileItem(note, showTimePrefix) {
            const anchored = isAnchoredNote(note);
            const el = document.createElement('div');
            el.className = `file-item ${currentNoteId === note.id ? 'active' : ''} ${anchored ? 'anchored' : ''}`.trim();
            el.id = `file-${note.id}`;

            const leadingIcon = anchored
                ? getAnchorIconMarkup()
                : '<span class="note-icon">&mdash;</span>';

            const timePrefix = (showTimePrefix && !anchored)
                ? `<span class="note-time-prefix">${formatTime12h(new Date(note.timestamp), false)}</span>`
                : '';

            el.innerHTML = `
                ${leadingIcon}
                ${timePrefix}
                <span class="item-text">${escapeHTML(getNoteTitle(note))}</span>
                <div class="item-controls">
                    <span class="control-btn menu">&#8942;</span>
                </div>
                <span class="star-btn ${note.isBookmarked ? 'is-active' : ''}">&#9733;</span>
            `;

            let wasDragged = false;
            if (!isMobileDevice) {
                if (!anchored) {
                    el.setAttribute('draggable', 'true');
                    el.addEventListener('dragstart', (e) => {
                        wasDragged = true;
                        const rawNoteIds = selectedNoteIds.has(note.id) && selectedNoteIds.size > 1
                            ? [...selectedNoteIds] : [note.id];
                        const noteIds = rawNoteIds.filter(id => {
                            const selectedNote = noteById.get(id);
                            return selectedNote && !isAnchoredNote(selectedNote);
                        });
                        if (noteIds.length === 0) {
                            e.preventDefault();
                            wasDragged = false;
                            return;
                        }
                        e.dataTransfer.setData('text/plain', JSON.stringify({
                            type: 'note',
                            noteId: noteIds[0],
                            noteIds: noteIds
                        }));
                        e.dataTransfer.effectAllowed = 'move';
                        el.style.opacity = '0.5';
                        highlightDropTargets('note');
                    });
                    el.addEventListener('dragend', () => {
                        el.style.opacity = '1';
                        clearAllDragOver();
                        clearDropTargets();
                        setTimeout(() => { wasDragged = false; }, 0);
                    });
                } else {
                    el.setAttribute('draggable', 'false');
                }
            } else {
                // Mobile: long-press opens context menu
                attachLongPress(el, (e) => showContextMenu(e, 'file', note.id));
            }

            el.onclick = (e) => {
                if (wasDragged) return;
                if (e.ctrlKey || e.metaKey) {
                    // Toggle selection
                    if (selectedNoteIds.has(note.id)) {
                        selectedNoteIds.delete(note.id);
                    } else {
                        selectedNoteIds.add(note.id);
                    }
                    lastClickedNoteId = note.id;
                    updateBulkBar();
                } else if (e.shiftKey && lastClickedNoteId) {
                    // Range select
                    selectRange(lastClickedNoteId, note.id);
                    updateBulkBar();
                } else {
                    // Normal click ->clear selection + load note
                    clearSelection();
                    loadNote(note.id);
                }
            };
            el.querySelector('.star-btn').onclick = (e) => toggleBookmark(e, 'file', note.id);
            el.querySelector('.menu').onclick = (e) => showContextMenu(e, 'file', note.id);
            el.addEventListener('contextmenu', (e) => showContextMenu(e, 'file', note.id));
            // Double-click to rename
            el.querySelector('.item-text').addEventListener('dblclick', (e) => {
                e.stopPropagation();
                startRename('file', note.id);
            });

            // Fade-in animation for newly created notes
            if (note.id === justCreatedNoteId) {
                el.classList.add('sidebar-fade-in');
                el.addEventListener('animationend', () => el.classList.remove('sidebar-fade-in'), { once: true });
                justCreatedNoteId = null;
            }

            return el;
        }

        // --- Recycle Bin Rendering ---
        function renderTrash() {
            const trashTree = document.getElementById('trashTree');
            const emptyBtn = document.getElementById('trashEmptyBtn');
            const toggleBtn = document.getElementById('trashToggle');
            trashTree.innerHTML = '';

            if (deletedNotes.length === 0) {
                emptyBtn.classList.remove('show');
                trashTree.classList.remove('show');
                toggleBtn.classList.remove('active');
                trashExpanded = false;
                return;
            }

            toggleBtn.classList.toggle('active', trashExpanded);
            trashTree.classList.toggle('show', trashExpanded);
            emptyBtn.classList.toggle('show', trashExpanded);

            if (!trashExpanded) return;

            const fragment = document.createDocumentFragment();

            // Build deleted folder lookup
            const deletedFolderById = new Map();
            deletedFolders.forEach(f => deletedFolderById.set(f.id, f));

            // Group deleted notes by folderId
            const notesByTrashFolder = new Map();
            const orphanNotes = [];
            deletedNotes.forEach(n => {
                if (n.folderId && (deletedFolderById.has(n.folderId) || n.folderId.startsWith('date:'))) {
                    if (!notesByTrashFolder.has(n.folderId)) notesByTrashFolder.set(n.folderId, []);
                    notesByTrashFolder.get(n.folderId).push(n);
                } else if (n.folderId && !n.folderId.startsWith('date:')) {
                    // Custom folder note but folder not in deletedFolders — group by folderId anyway
                    if (!notesByTrashFolder.has(n.folderId)) notesByTrashFolder.set(n.folderId, []);
                    notesByTrashFolder.get(n.folderId).push(n);
                } else {
                    orphanNotes.push(n);
                }
            });

            // Render custom deleted folders
            const renderedFolderIds = new Set();
            const renderTrashFolder = (folder) => {
                if (renderedFolderIds.has(folder.id)) return null;
                renderedFolderIds.add(folder.id);

                const folderNotes = notesByTrashFolder.get(folder.id) || [];
                const subFolders = deletedFolders.filter(f => f.parentId === folder.id);

                if (folderNotes.length === 0 && subFolders.length === 0) return null;

                const container = document.createElement('div');
                container.className = 'tree-item open';
                const header = document.createElement('div');
                header.className = 'tree-header';
                header.setAttribute('data-folder-id', folder.id);
                header.innerHTML = `
                    <span class="arrow">&#9654;</span>
                    <span class="item-text">${escapeHTML(folder.name)}</span>
                    <span class="folder-count">${folderNotes.length}</span>
                    <div class="item-controls">
                        <span class="control-btn menu">&#8942;</span>
                    </div>
                `;
                header.querySelector('.menu').onclick = (e) => showContextMenu(e, 'folder', folder.id, true);
                header.onclick = (e) => {
                    if (!e.target.classList.contains('control-btn')) {
                        container.classList.toggle('open');
                    }
                };

                const children = document.createElement('div');
                children.className = 'tree-children';

                folderNotes.sort((a, b) => b.timestamp - a.timestamp).forEach(n => {
                    children.appendChild(createTrashFileItem(n));
                });
                subFolders.forEach(sf => {
                    const sfEl = renderTrashFolder(sf);
                    if (sfEl) children.appendChild(sfEl);
                });

                container.appendChild(header);
                container.appendChild(children);
                return container;
            };

            // Render root-level deleted folders
            deletedFolders.filter(f => !f.parentId || !deletedFolderById.has(f.parentId)).forEach(folder => {
                const el = renderTrashFolder(folder);
                if (el) fragment.appendChild(el);
            });

            // Render date-grouped notes
            const dateGroups = new Map();
            notesByTrashFolder.forEach((notesArr, fId) => {
                if (fId.startsWith('date:')) {
                    const dateKey = fId.substring(5);
                    if (!dateGroups.has(dateKey)) dateGroups.set(dateKey, []);
                    dateGroups.get(dateKey).push(...notesArr);
                }
            });

            [...dateGroups.entries()].sort((a, b) => b[0].localeCompare(a[0])).forEach(([dateKey, dnotes]) => {
                const container = document.createElement('div');
                container.className = 'tree-item open';
                const header = document.createElement('div');
                header.className = 'tree-header';
                header.innerHTML = `
                    <span class="arrow">&#9654;</span>
                    <span class="item-text">${escapeHTML(dateKey)}</span>
                    <span class="folder-count">${dnotes.length}</span>
                `;
                header.onclick = () => container.classList.toggle('open');
                const children = document.createElement('div');
                children.className = 'tree-children';
                dnotes.sort((a, b) => b.timestamp - a.timestamp).forEach(n => {
                    children.appendChild(createTrashFileItem(n));
                });
                container.appendChild(header);
                container.appendChild(children);
                fragment.appendChild(container);
            });

            // Render orphan notes (temporal, no folder)
            orphanNotes.sort((a, b) => b.timestamp - a.timestamp).forEach(n => {
                fragment.appendChild(createTrashFileItem(n));
            });

            trashTree.appendChild(fragment);
        }

        function createTrashFileItem(note) {
            const el = document.createElement('div');
            el.className = 'file-item';
            el.id = `trash-${note.id}`;
            el.innerHTML = `
                <span class="note-icon">&mdash;</span>
                <span class="item-text">${escapeHTML(getNoteTitle(note))}</span>
                <div class="item-controls">
                    <span class="control-btn menu">&#8942;</span>
                </div>
            `;
            el.querySelector('.menu').onclick = (e) => showContextMenu(e, 'file', note.id, true);
            el.onclick = (e) => {
                if (!e.target.classList.contains('control-btn')) {
                    // Load note content in read-only view
                    ensureContentLoaded(note);
                    editor.value = note.content;
                    currentNoteId = null;
                    editor.readOnly = true;
                    document.getElementById('toolbarTrash').classList.remove('show');
                }
            };
            return el;
        }

        // --- Undo Delete ---
        function performDelete(type, id) {
            // Find element to animate before deletion
            let el = null;
            if (type === 'file') {
                el = document.getElementById('file-' + id);
            } else {
                const header = document.querySelector(`[data-folder-id="${id}"]`);
                el = header ? header.closest('.tree-item, .sub-folder') : null;
            }

            if (el && !el.dataset.fading) {
                el.dataset.fading = '1';
                el.classList.add('sidebar-fade-out');
                const done = () => {
                    if (!el.dataset.fading) return;
                    delete el.dataset.fading;
                    executeDelete(type, id);
                };
                el.addEventListener('animationend', done, { once: true });
                setTimeout(() => { if (el.dataset.fading) done(); }, 250);
            } else {
                executeDelete(type, id);
            }
        }

        function executeDelete(type, id) {
            commitPendingDelete(); // commit any previous pending delete

            const snapshot = { notes: [], folders: [], aliases: {}, wasCurrentId: currentNoteId };
            const trashedNotes = [];
            const trashedFolders = [];

            let needsFullRebuild = false;

            if (type === 'file') {
                const note = noteById.get(id);
                if (note) {
                    ensureContentLoaded(note);
                    snapshot.notes.push({ ...note });
                    trashedNotes.push(note);
                    indexRemove(note);
                }
                notes = notes.filter(n => n.id !== id);
                if (currentNoteId === id) prepareGhostNote();
            } else if (type === 'folder') {
                needsFullRebuild = true;
                if (folderById.has(id)) {
                    // Custom folder cascade
                    const foldersToDelete = new Set();
                    const collectFolders = (fid) => {
                        foldersToDelete.add(fid);
                        (childFolders.get(fid) || []).forEach(sub => collectFolders(sub.id));
                    };
                    collectFolders(id);
                    // Snapshot folders
                    const affectedFolders = folders.filter(f => foldersToDelete.has(f.id));
                    affectedFolders.forEach(f => {
                        snapshot.folders.push({ ...f });
                        trashedFolders.push({ ...f });
                    });
                    // Snapshot notes (no removeNoteStorage — content stays for trash)
                    notes.filter(n => n.folderId && foldersToDelete.has(n.folderId)).forEach(n => {
                        ensureContentLoaded(n);
                        snapshot.notes.push({ ...n });
                        trashedNotes.push(n);
                    });
                    notes = notes.filter(n => !n.folderId || !foldersToDelete.has(n.folderId));
                    folders = folders.filter(f => !foldersToDelete.has(f.id));
                } else {
                    // Temporal folder
                    const notesToDelete = getNotesInFolder(id);
                    notesToDelete.forEach(n => {
                        ensureContentLoaded(n);
                        snapshot.notes.push({ ...n });
                        trashedNotes.push(n);
                    });
                    notes = notes.filter(n => !notesToDelete.includes(n));
                    if (folderAliases[id]) {
                        snapshot.aliases[id] = folderAliases[id];
                        delete folderAliases[id];
                    }
                }
                if (currentNoteId && !notes.some(n => n.id === currentNoteId)) prepareGhostNote();
            }

            // Move to trash instead of permanent delete
            moveToTrash(trashedNotes, trashedFolders);

            saveData();
            if (needsFullRebuild) rebuildIndexes();
            renderSidebar();
            renderTrash();

            pendingDelete = snapshot;
            showUndoToast(type === 'file' ? 'note deleted' : 'folder deleted');
        }

        function commitPendingDelete() {
            if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
            pendingDelete = null;
            document.getElementById('undoToast').classList.remove('show');
        }

        function undoDelete() {
            if (!pendingDelete) return;
            const snap = pendingDelete;

            // Remove from trash and restore to notes
            snap.notes.forEach(n => {
                // Pull from deletedNotes
                deletedNotes = deletedNotes.filter(dn => dn.id !== n.id);
                n._contentLoaded = true;
                notes.push(n);
                saveNoteContent(n);
            });
            notes.sort((a, b) => b.timestamp - a.timestamp);

            // Restore folders
            snap.folders.forEach(f => {
                deletedFolders = deletedFolders.filter(df => df.id !== f.id);
                folders.push(f);
            });

            // Restore aliases
            Object.assign(folderAliases, snap.aliases);

            saveData();
            saveDeletedData();
            rebuildIndexes();
            renderSidebar();
            renderTrash();

            // Reload the note that was active before delete
            if (snap.wasCurrentId && noteById.get(snap.wasCurrentId)) {
                loadNote(snap.wasCurrentId);
            }

            commitPendingDelete();
        }

        function showUndoToast(message) {
            const toast = document.getElementById('undoToast');
            document.getElementById('undoMessage').textContent = message;
            toast.classList.add('show');
            if (undoTimer) clearTimeout(undoTimer);
            undoTimer = setTimeout(() => commitPendingDelete(), 7500);
        }

        // --- Multi-Select ---
        function updateBulkBar() {
            const bar = document.getElementById('bulkBar');
            const count = document.getElementById('bulkCount');
            if (selectedNoteIds.size > 0) {
                bar.classList.add('show');
                count.textContent = selectedNoteIds.size + ' selected';
            } else {
                bar.classList.remove('show');
            }
            // Apply .selected class to DOM
            document.querySelectorAll('.file-item').forEach(el => {
                const noteId = parseInt(el.id.replace('file-', ''));
                el.classList.toggle('selected', selectedNoteIds.has(noteId));
            });
        }

        function clearSelection() {
            selectedNoteIds.clear();
            lastClickedNoteId = null;
            updateBulkBar();
        }

        function selectRange(fromId, toId) {
            const items = getVisibleItems();
            const noteItems = items.filter(el => el.classList.contains('file-item'));
            let fromIdx = -1, toIdx = -1;
            noteItems.forEach((el, i) => {
                const nId = parseInt(el.id.replace('file-', ''));
                if (nId === fromId) fromIdx = i;
                if (nId === toId) toIdx = i;
            });
            if (fromIdx === -1 || toIdx === -1) return;
            const start = Math.min(fromIdx, toIdx);
            const end = Math.max(fromIdx, toIdx);
            for (let i = start; i <= end; i++) {
                const nId = parseInt(noteItems[i].id.replace('file-', ''));
                selectedNoteIds.add(nId);
            }
        }

        function performBulkDelete(noteIds) {
            const elements = noteIds.map(nId => document.getElementById('file-' + nId)).filter(Boolean);

            const doDelete = () => {
                commitPendingDelete();
                const snapshot = { notes: [], folders: [], aliases: {}, wasCurrentId: currentNoteId };
                const trashedNotes = [];
                noteIds.forEach(nId => {
                    const note = noteById.get(nId);
                    if (note) {
                        ensureContentLoaded(note);
                        snapshot.notes.push({ ...note });
                        trashedNotes.push(note);
                    }
                });
                notes = notes.filter(n => !noteIds.includes(n.id));
                moveToTrash(trashedNotes, []);
                if (currentNoteId && noteIds.includes(currentNoteId)) prepareGhostNote();
                clearSelection();
                saveData();
                rebuildIndexes();
                renderSidebar();
                renderTrash();
                pendingDelete = snapshot;
                const count = snapshot.notes.length;
                showUndoToast(count + (count === 1 ? ' note' : ' notes') + ' deleted.');
            };

            if (elements.length > 0) {
                let remaining = elements.length;
                const onDone = () => {
                    remaining--;
                    if (remaining <= 0) doDelete();
                };
                elements.forEach(el => {
                    el.classList.add('sidebar-fade-out');
                    el.addEventListener('animationend', onDone, { once: true });
                });
                setTimeout(() => { if (remaining > 0) { remaining = 0; doDelete(); } }, 250);
            } else {
                doDelete();
            }
        }

        // --- Keyboard Navigation ---
        function getVisibleItems() {
            const items = [];
            fileTree.querySelectorAll('.tree-header, .file-item').forEach(el => {
                // Skip items inside collapsed .tree-children
                const parent = el.closest('.tree-children');
                if (parent && !parent.parentElement.classList.contains('open')) return;
                items.push(el);
            });
            return items;
        }

        function setFocusedItem(index) {
            const items = getVisibleItems();
            // Clear old focus
            document.querySelectorAll('.focused').forEach(el => el.classList.remove('focused'));
            if (index < 0 || index >= items.length) {
                focusedItemIndex = -1;
                return;
            }
            focusedItemIndex = index;
            items[index].classList.add('focused');
            items[index].scrollIntoView({ block: 'nearest' });
        }

        function activateFocusedItem() {
            const items = getVisibleItems();
            if (focusedItemIndex < 0 || focusedItemIndex >= items.length) return;
            items[focusedItemIndex].click();
        }

        // --- Markdown Formatting ---
        function wrapSelection(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selected = editor.value.substring(start, end);
            const val = editor.value;

            // If already wrapped, unwrap
            const preBefore = val.substring(Math.max(0, start - before.length), start);
            const postAfter = val.substring(end, end + after.length);
            if (preBefore === before && postAfter === after) {
                editor.value = val.substring(0, start - before.length) + selected + val.substring(end + after.length);
                editor.selectionStart = start - before.length;
                editor.selectionEnd = end - before.length;
            } else {
                editor.value = val.substring(0, start) + before + selected + after + val.substring(end);
                editor.selectionStart = start + before.length;
                editor.selectionEnd = end + before.length;
            }
            editor.focus();
            editor.dispatchEvent(new Event('input'));
        }

        function insertAtLineStart(prefix) {
            const start = editor.selectionStart;
            const val = editor.value;
            // Find line start
            const lineStart = val.lastIndexOf('\n', start - 1) + 1;
            const lineContent = val.substring(lineStart, start);

            if (lineContent.startsWith(prefix)) {
                // Remove prefix
                editor.value = val.substring(0, lineStart) + val.substring(lineStart + prefix.length);
                editor.selectionStart = editor.selectionEnd = start - prefix.length;
            } else {
                editor.value = val.substring(0, lineStart) + prefix + val.substring(lineStart);
                editor.selectionStart = editor.selectionEnd = start + prefix.length;
            }
            editor.focus();
            editor.dispatchEvent(new Event('input'));
        }

        function applyFormat(format) {
            if (!currentNoteId && !editor.value.trim()) return;
            switch (format) {
                case 'bold': wrapSelection('**', '**'); break;
                case 'italic': wrapSelection('*', '*'); break;
                case 'code': wrapSelection('`', '`'); break;
                case 'heading': insertAtLineStart('# '); break;
                case 'link':
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    const selected = editor.value.substring(start, end);
                    if (selected) {
                        wrapSelection('[', '](url)');
                    } else {
                        wrapSelection('[', 'link](url)');
                    }
                    break;
                case 'list': insertAtLineStart('- '); break;
            }
        }

        // --- Markdown Preview ---
        function parseMarkdown(text) {
            // Escape HTML first (XSS-safe)
            let html = escapeHTML(text);

            // Code blocks (``` ... ```)
            html = html.replace(/```([\s\S]*?)```/g, (m, code) => `<pre><code>${code.trim()}</code></pre>`);

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headers (must be at line start)
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Horizontal rules
            html = html.replace(/^---$/gm, '<hr>');

            // Blockquotes
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

            // Bold and italic
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Links [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, label, rawHref) => {
                const safeHref = sanitizePreviewHref(rawHref);
                if (!safeHref) return label;
                return `<a href="${escapeHTML(safeHref)}" target="_blank" rel="noopener noreferrer">${label}</a>`;
            });

            // Auto-link plain URLs in preview output.
            html = linkifyPlainUrls(html);

            // Unordered lists
            html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Paragraphs: wrap remaining lines
            html = html.split('\n').map(line => {
                const trimmed = line.trim();
                if (!trimmed) return '';
                if (/^<(h[1-3]|hr|pre|ul|ol|li|blockquote)/.test(trimmed)) return trimmed;
                return `<p>${trimmed}</p>`;
            }).join('\n');

            return html;
        }

        function togglePreview() {
            const preview = document.getElementById('preview');
            const toggleBtn = document.getElementById('previewToggle');
            previewMode = !previewMode;

            if (previewMode) {
                preview.innerHTML = parseMarkdown(editor.value);
                editor.style.display = 'none';
                preview.style.display = 'block';
                toggleBtn.textContent = 'edit';
                toggleBtn.classList.add('active');

                // Intercept link clicks with warning
                preview.onclick = (e) => {
                    const link = e.target.closest('a');
                    if (link) {
                        e.preventDefault();
                        const safeHref = sanitizePreviewHref(link.getAttribute('href'));
                        if (!safeHref) {
                            alert('Blocked unsafe or unsupported link.');
                            return;
                        }
                        if (confirm('This link goes to an external site not associated with Imminote. Continue?')) {
                            window.open(safeHref, '_blank', 'noopener,noreferrer');
                        }
                    }
                };
            } else {
                editor.style.display = '';
                preview.style.display = 'none';
                toggleBtn.innerHTML = '<span class="tool-label-long">markdown preview</span><span class="tool-label-short">preview</span>';
                toggleBtn.classList.remove('active');
                editor.focus();
            }
        }

        function deleteCurrentNote() {
            if (currentNoteId) performDelete('file', currentNoteId);
        }

        function toggleSidebar() {
            sidebarCollapsed = !sidebarCollapsed;
            document.getElementById('sidebar').classList.toggle('sidebar-collapsed', sidebarCollapsed);
            updateBackdrop();
            localStorage.setItem('imminote_sidebar_collapsed', sidebarCollapsed ? '1' : '0');
        }

        function updateBackdrop() {
            const backdrop = document.getElementById('sidebarBackdrop');
            if (!backdrop) return;
            const isSmall = window.matchMedia('(max-width: 1000px)').matches;
            backdrop.classList.toggle('show', isSmall && !sidebarCollapsed);
        }

        /*on : off*/
        function updateWritingBoundariesMenu() {
            if (ioBoundaryLabel) {
                ioBoundaryLabel.textContent = writingBoundariesEnabled ? 'writing boundaries' : 'writing boundaries';
            }
            if (ioBoundaryIcon) {
                ioBoundaryIcon.innerHTML = writingBoundariesEnabled ? '&#9635;' : '&#9723;';
            }
        }

        function applyWritingBoundaries(enabled, persist = true) {
            writingBoundariesEnabled = !!enabled;
            if (writingBoundariesEnabled) {
                document.documentElement.removeAttribute('data-writing-boundaries');
            } else {
                document.documentElement.setAttribute('data-writing-boundaries', 'off');
            }
            if (persist) {
                localStorage.setItem('imminote_writing_boundaries', writingBoundariesEnabled ? '1' : '0');
            }
            updateWritingBoundariesMenu();
        }

        function toggleWritingBoundaries() {
            applyWritingBoundaries(!writingBoundariesEnabled);
        }

        function toggleTheme() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const newTheme = isLight ? 'dark' : 'light';
            if (newTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('imminote_theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            if (ioThemeIcon) ioThemeIcon.innerHTML = theme === 'light' ? '&#9728;' : '&#9790;';
            if (ioThemeLabel) ioThemeLabel.textContent = `theme: ${theme === 'light' ? 'light' : 'dark'}`;
            // Update meta theme-color
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) metaTheme.content = theme === 'light' ? '#f5f0e8' : '#1e1e1e';
        }

        // --- MERGED EDITOR LOGIC ---
        const debouncedSaveIndicator = debounce(() => {
            indicator.classList.add('show');
            if (saveIndicatorTimer) clearTimeout(saveIndicatorTimer);
            saveIndicatorTimer = setTimeout(() => indicator.classList.remove('show'), 1500);
        }, 300);

        // Debounced localStorage write - only saves the current note's content (fast)
        const debouncedSaveContent = debounce(() => {
            if (currentNoteId) {
                const note = noteById.get(currentNoteId);
                if (note) saveNoteContent(note);
            }
        }, 300);

        // On text entry
        editor.addEventListener('input', function () {
            const content = editor.value.trim();

            if (currentNoteId === null) {
                // Ghost Mode -> Create Real Note
                if (content.length > 0) {
                    createRealNoteFromGhost();
                }
            } else {
                // Real Mode -> Handle Updates
                if (content.length === 0) {
                    // User cleared note -> soft delete with undo
                    performDelete('file', currentNoteId);
                } else {
                    // Update Note
                    const note = noteById.get(currentNoteId);
                    if (note) {
                        note.content = editor.value;
                        debouncedSaveContent();

                        if (!note.customTitle) {
                            const label = document.querySelector(`#file-${currentNoteId} .item-text`);
                            if (label) label.innerText = getNoteTitle(note);
                        }

                        debouncedSaveIndicator();
                    }
                }
            }
            updateWordCount();
            ensureCursorVisible();
        });

        // --- Scroll to keep cursor visible above toolbar ---
        // Uses a reusable offscreen clone to measure cursor Y position.
        // Only runs the measurement when cursor is in the last ~500 chars (likely near bottom).
        const _scrollClone = document.createElement('textarea');
        _scrollClone.setAttribute('aria-hidden', 'true');
        _scrollClone.setAttribute('tabindex', '-1');
        _scrollClone.style.cssText = `
            position: absolute; left: -9999px; top: -9999px;
            visibility: hidden; pointer-events: none;
            width: ${editor.clientWidth}px;
            font: ${getComputedStyle(editor).font};
            line-height: ${getComputedStyle(editor).lineHeight};
            padding: ${getComputedStyle(editor).padding};
            border: ${getComputedStyle(editor).border};
            white-space: pre-wrap; word-wrap: break-word;
            overflow: hidden; height: auto;
        `;
        document.body.appendChild(_scrollClone);

        function ensureCursorVisible() {
            const pos = editor.selectionStart;
            // Skip expensive measurement if cursor is far from end
            if (pos < editor.value.length - 500 && editor.scrollTop < editor.scrollHeight - editor.clientHeight - 100) return;

            _scrollClone.style.width = editor.clientWidth + 'px';
            _scrollClone.value = editor.value.substring(0, pos);
            const cursorY = _scrollClone.scrollHeight;
            const visibleBottom = editor.scrollTop + editor.clientHeight - 90; // 90px toolbar buffer

            if (cursorY > visibleBottom) {
                editor.scrollTop = cursorY - editor.clientHeight + 120;
            }
        }

        // --- Tap editor to close sidebar on small screens ---
        editor.addEventListener('click', function () {
            const isSmall = window.matchMedia('(max-width: 1000px)').matches;
            if (isSmall && !sidebarCollapsed) {
                toggleSidebar();
            }
        });

        // --- Templates ---
        const DEFAULT_TEMPLATES = [
            { id: 'default-todo', name: 'To Do', content: 'To do:\n---------------------------------------------------\n- \n- \n- \n- \n- \n- \n- \n- \n- \n' }
        ];

        function loadTemplates() {
            const parsed = parseStoredJSON('imminote_templates', null, Array.isArray);
            if (parsed) {
                templates = parsed;
            } else {
                templates = DEFAULT_TEMPLATES.map(t => ({ ...t }));
                saveTemplates();
            }
        }

        function saveTemplates() {
            localStorage.setItem('imminote_templates', JSON.stringify(templates));
        }

        function toggleTemplateMenu() {
            if (templateMenu.classList.contains('show')) {
                templateMenu.classList.remove('show');
                templateSaveMode = false;
                return;
            }
            templateSaveMode = false;
            renderTemplateMenu();
            // Position above the Templates button
            const btn = document.getElementById('templateBtn');
            const rect = btn.getBoundingClientRect();
            const mainRect = document.getElementById('main').getBoundingClientRect();
            templateMenu.style.left = (rect.left - mainRect.left) + 'px';
            templateMenu.style.bottom = (mainRect.bottom - rect.top + 4) + 'px';
            templateMenu.classList.add('show');
        }

        function renderTemplateMenu() {
            let html = '';
            if (templateSaveMode) {
                html += '<div class="template-save-row" onclick="event.stopPropagation()"><input class="template-name-input" placeholder="Template name..." maxlength="40"><span class="template-save-confirm" onclick="confirmSaveTemplate()">Save</span></div>';
            } else {
                html += '<div class="context-item" onclick="event.stopPropagation(); saveAsTemplate()"><span>+</span> Save as Template</div>';
            }
            if (templates.length > 0) {
                html += '<div class="context-divider"></div>';
                templates.forEach((t, i) => {
                    html += `<div class="context-item" onclick="loadTemplate(${i})"><span class="template-name">${escapeHTML(t.name)}</span><span class="template-delete" onclick="event.stopPropagation(); deleteTemplate(${i})" title="Delete template">&#10005;</span></div>`;
                });
            } else if (!templateSaveMode) {
                html += '<div class="template-empty-hint">No templates yet</div>';
            }
            templateMenu.innerHTML = html;
            if (templateSaveMode) {
                const input = templateMenu.querySelector('.template-name-input');
                if (input) {
                    input.focus();
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') { e.preventDefault(); confirmSaveTemplate(); }
                        if (e.key === 'Escape') { templateSaveMode = false; renderTemplateMenu(); }
                    });
                }
            }
        }

        function saveAsTemplate() {
            if (!editor.value.trim()) return;
            templateSaveMode = true;
            renderTemplateMenu();
        }

        function confirmSaveTemplate() {
            const input = templateMenu.querySelector('.template-name-input');
            const name = input ? input.value.trim() : '';
            if (!name) return;
            templates.push({ id: generateId(), name: name, content: editor.value });
            saveTemplates();
            templateSaveMode = false;
            renderTemplateMenu();
        }

        function loadTemplate(index) {
            templateMenu.classList.remove('show');
            const t = templates[index];
            if (!t) return;
            editor.value = t.content;
            editor.focus();
            editor.dispatchEvent(new Event('input'));
        }

        function deleteTemplate(index) {
            templates.splice(index, 1);
            saveTemplates();
            renderTemplateMenu();
        }

        function flashIndicator(msg) {
            indicator.textContent = msg;
            indicator.classList.add('show');
            if (saveIndicatorTimer) clearTimeout(saveIndicatorTimer);
            saveIndicatorTimer = setTimeout(() => {
                indicator.classList.remove('show');
                indicator.textContent = 'Saved';
            }, 1500);
        }

        window.addEventListener('load', init);
        window.addEventListener('beforeunload', () => {
            // Flush any pending content save for current note
            if (currentNoteId) {
                const note = noteById.get(currentNoteId);
                if (note && note._contentLoaded) saveNoteContent(note);
            }
            saveData();
        });
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    </script>
</body>
</html>
