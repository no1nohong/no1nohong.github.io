<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover: safe-area-inset-* for notched devices.
         maximum-scale=1: prevents Safari auto-zoom on input focus.
         (iOS 10+ still allows pinch-to-zoom even with maximum-scale=1.) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta name="description"
        content="Imminote - a fast, offline-first note-taking app. No cloud, no frameworks, just your thoughts.">
    <meta name="theme-color" content="#f5f0e8">
    <title>&#10084; Imminote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Prevents zoom on mobile*/
        * {
            touch-action: manipulation;
        }

        :root {
            --bg-color: #1e1e1e;
            --sidebar-bg: #232323;
            --hover-bg: #2c2c2c;
            --active-bg: rgba(141, 92, 68, 0.37);

            /* Earth Tones */
            --earth-primary: #e99b73;
            --earth-dim: rgba(207, 142, 109, 0.1);
            --earth-dimmer: rgba(207, 142, 109, 0.05);

            --text-color: #9c948c;
            --text-active: rgb(236, 229, 222);
            --bookmark-color: #e5c07b;
            --border-color: rgba(236, 229, 222, 0.13);

            /* Semantic surface & text tokens */
            --surface-deep: #111;
            --surface-raised: #2d2d2d;
            --surface-overlay: #333;
            --surface-overlay-border: #454545;
            --border-strong: rgba(236, 229, 222, 0.18);
            --text-dim: #b9aea1;
            --text-muted: #c4bbb0;
            --text-overlay: #eee;
            --text-chars: #daccbd;
            --danger-color: #ff8b8b;
            --danger-color-muted: #be5a5a;
            --editor-guide: rgba(236, 229, 222, 0.11);

            --font-stack: 'DM Mono', 'Fira Code', Consolas, monospace;
            --editor-font-size: 15px;
        }

        [data-theme="light"] {
            --bg-color: #f5f0e8;
            --sidebar-bg: #ece5d8;
            --hover-bg: #e3dcd0;
            --active-bg: #d6c4a6;
            --earth-primary: #c37136;
            --earth-dim: rgba(181, 118, 74, 0.12);
            --earth-dimmer: rgba(181, 118, 74, 0.06);
            --text-color: #7a6f5f;
            --text-active: #2a231b;
            --bookmark-color: #c49a3c;
            --border-color: #d4cdc2;

            --surface-deep: #ddd7cc;
            --surface-raised: #e3dcd0;
            --surface-overlay: #e8e1d6;
            --surface-overlay-border: var(--border-color);
            --border-strong: #aca69c;
            --text-dim: var(--text-color);
            --text-muted: #6b6155;
            --text-chars: #5a5247;
            --text-overlay: var(--text-active);
            --danger-color: #c44;
            --danger-color-muted: rgb(188, 97, 97);
            --editor-guide: rgba(122, 111, 95, 0.28);
        }

        /* --- Selection Highlight --- */
        ::selection {
            background: rgba(207, 142, 109, 0.35);
            color: var(--text-active);
        }

        [data-theme="light"] ::selection {
            background: rgba(181, 118, 74, 0.3);
            color: #3d3527;
        }

        /* Prevent horizontal drift on mobile browsers */
        html {
            overflow-x: hidden;
        }

        body {
            background: var(--bg-color);
            color: var(--text-active);
            font-family: var(--font-stack);
            height: 100vh;
            height: 100dvh;
            width: 100%;
            display: flex;
            overflow: hidden;
            /* Safe area padding for notched devices (applied via viewport-fit=cover) */
            padding:
                env(safe-area-inset-top)
                env(safe-area-inset-right)
                0
                env(safe-area-inset-left);
        }

        /* --- Sidebar --- */
        #sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            user-select: none;
            transition: width 0.2s ease, border-width 0.2s ease;
            overflow: hidden;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        #sidebar.sidebar-collapsed {
            width: 0;
            border-right-width: 0;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 15;
        }

        .tool-label-short {
            display: none;
        }

        .sidebar-toggle {
            display: none;
        }

        /* Close button inside sidebar — only visible on mobile overlay (≤480px) */
        .icon-btn.sidebar-close-btn {
            display: none;
        }

        .sidebar-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-weight: 500;
            letter-spacing: 2px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .icon-btn:hover {
            background: var(--hover-bg);
            color: var(--text-active);
        }

        .icon-btn:active {
            transform: scale(0.93);
        }

        .icon-btn.active {
            color: var(--bookmark-color);
            border-color: var(--bookmark-color);
            background: rgba(229, 192, 123, 0.1);
        }

        .new-btn {
            background: transparent;
            color: var(--earth-primary);
            border: 1px solid var(--earth-primary);
            padding: 0 10px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            display: flex;
            align-items: center;
            white-space: nowrap;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }

        .new-btn:hover {
            background: var(--earth-dim);
            border-color: var(--earth-primary);
        }

        .new-btn:active {
            transform: scale(0.95);
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            background: var(--surface-deep);
            border: 1px solid var(--border-color);
            color: var(--text-active);
            padding: 7px 28px 7px 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .search-input:focus {
            border-color: var(--earth-primary);
            background: var(--surface-raised);
        }

        .search-clear {
            position: absolute;
            right: 6px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            font-family: var(--font-stack);
            padding: 0 2px;
            line-height: 1;
            display: none;
            transition: color 0.15s;
        }

        .search-clear:hover {
            color: var(--text-active);
        }

        .search-clear.show {
            display: block;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            font-size: 13px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--border-strong) var(--sidebar-bg);
            height: 30px;
        }

        /* --- Tree Items --- */
        .tree-item {
            position: relative;
            color: var(--text-color);
        }

        .tree-header,
        .file-item {
            display: flex;
            align-items: center;
            padding: 4px 10px 4px 8px;
            cursor: pointer;
            border-left: 2px solid transparent;
            position: relative;
            min-height: 30px;
            max-height: 30px;
            transition: background 0.1s ease, border-color 0.1s ease, color 0.1s ease;
        }

        .tree-header:hover,
        .file-item:hover {
            background: var(--hover-bg);
            color: var(--text-active);
        }

        /* Highlighting Logic */
        .tree-item.active-parent>.tree-header {
            background: var(--earth-dimmer);
            border-left-color: var(--earth-primary);
            color: var(--text-active);
        }

        .file-item.active {
            background: var(--active-bg);
            color: var(--text-active);
            border-left: 2px solid var(--earth-primary);
            font-weight: 500;
        }

        .sub-folder.active-parent>.tree-header {
            color: var(--text-active)!important;
            background: var(--earth-dim);
        }

        /* --- Today label on day folder --- */
        .today-label {
            color: var(--earth-primary);
            font-weight: 500;
        }

        .arrow {
            display: inline-block;
            width: 16px;
            text-align: center;
            font-size: 10px;
            transition: transform 0.15s ease;
            margin-right: 4px;
            opacity: 0.5;
        }

        .tree-item.open>.tree-header .arrow {
            transform: rotate(90deg);
        }
        .note-icon,
        .anchor-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            margin-right: 4px;
            flex-shrink: 0;
        }

        .note-icon {
            font-size: 10px;
            opacity: 0.25;
            color: var(--earth-primary);
        }

        .anchor-icon {
            color: var(--text-muted);
            opacity: 0.72;
            pointer-events: none;
        }

        .context-item .anchor-icon {
            width: 14px;
            height: 14px;
            margin-right: 0;
            color: currentColor;
            opacity: 1;
        }

        .file-item.active .anchor-icon,
        .file-item:hover .anchor-icon,
        .file-item.focused .anchor-icon {
            color: var(--text-active);
            opacity: 1;
        }

        .item-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 8px;
        }

        .tree-header .item-text { font-weight: 500; }
        .file-item .item-text { color: var(--text-muted); }
        .file-item.active .item-text { color: var(--text-active); }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .tree-header:hover .item-controls,
        .file-item:hover .item-controls {
            opacity: 0.5;
        }

        .item-controls:hover {
            opacity: 1 !important;
        }

        .control-btn {
            color: var(--text-color);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
            transition: background 0.15s, color 0.15s;
        }

        .control-btn:hover {
            background: var(--border-strong);
            color: var(--text-active);
        }

        .control-btn:active {
            transform: scale(0.93);
        }

        .star-btn {
            color: var(--text-color);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            align-items: center;
        }

        .tree-header:hover .star-btn,
        .file-item:hover .star-btn {
            opacity: 0.35;
        }

        .star-btn:hover {
            opacity: 1 !important;
            color: var(--bookmark-color);
        }

        .star-btn.is-active {
            color: var(--bookmark-color);
            opacity: 1;
        }

        .control-btn.add-note {
           margin-left: 4px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
        }

        .control-btn.add-note:hover {
            color: var(--earth-primary);
        }

        .file-item {
            padding-left: 26px;
        }

        .sub-folder .tree-header {
            padding-left: 26px;
        }

        .sub-folder .file-item {
            padding-left: 46px;
        }

        /* --- Folder type hierarchy --- */
        .tree-header[data-drop-type="date"] {
            padding-top: 4px;
            padding-bottom: 4px;
            margin-top: 0;
            height: auto;
            min-height: 28px;
        }

        .tree-header[data-drop-type="date"] .item-text {
            font-size: 13px;
            letter-spacing: 0.2px;
        }

        .tree-header[data-drop-type="date"] .arrow {
            opacity: 0.5;
            font-size: 9px;
        }

        /* --- Month folder (top-level temporal container) --- */
        .tree-header[data-drop-type="month"] {
            padding-top: 8px;
            padding-bottom: 8px;
            margin-top: 6px;
            height: auto;
            min-height: 30px;
            position: relative;
        }

        .tree-header[data-drop-type="month"] .item-text {
            flex: 0 0 auto;
            letter-spacing: 0.4px;
            text-transform: lowercase;
            color: var(--text-color);
            font-weight: 500;
            overflow: visible;
        }

        .tree-header[data-drop-type="month"] .arrow {
            opacity: 0.5;
        }

        /* Line before controls: fills space between count and controls/star */
        .tree-header[data-drop-type="month"]::before {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--text-color);
            margin-left: 8px;
            opacity: 0.13;
            order: 1;
        }

        .tree-header[data-drop-type="month"] .folder-count {
            opacity: 0.4;
            font-size: 10px;
            background: none;
            margin-right: 0!important;
        }

        .tree-header[data-drop-type="month"] .item-controls {
            display: none;
            order: 2;
        }

        .tree-header[data-drop-type="month"]:hover .item-controls {
            display: flex;
        }

        /* Line after controls: matches the star-btn space so ⋮ aligns with other rows */
        .tree-header[data-drop-type="month"]::after {
            content: '';
            width: 18px;
            flex-shrink: 0;
            height: 1px;
            background: var(--text-color);
            opacity: 0.13;
            order: 4;
        }

        .tree-header[data-drop-type="month"] .star-btn {
            display: none;
        }

        /* --- Note time prefix --- */
        .note-time-prefix {
            font-size: 13px;
            color: var(--text-dim);
            opacity: 0.5;
            margin-right: 6px;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .file-item.active .note-time-prefix,
        .file-item:hover .note-time-prefix {
            opacity: 0.8;
        }

        .tree-header[data-drop-type="custom"] .arrow {
            color: var(--earth-primary);
            opacity: 0.5;
        }

        .tree-children {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.2s ease-out;
        }

        .tree-item.open>.tree-children {
            max-height: 2000px;
            transition: max-height 0.35s ease-in;
        }

        /* Sidebar Animations */
        @keyframes sidebarFadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sidebar-fade-in {
            animation: sidebarFadeIn 0.25s ease-out;
        }

        @keyframes sidebarFadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(4px);
            }
        }

        .sidebar-fade-out {
            animation: sidebarFadeOut 0.2s ease-in forwards;
        }

        /* Context Menu */
        .context-menu {
            position: absolute;
            background: var(--surface-overlay);
            border: 1px solid var(--surface-overlay-border);
            border-radius: 4px;
            padding: 4px 0;
            z-index: 100;
            min-width: 140px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
            display: none;
            animation: menuFadeIn 0.12s ease-out;
        }

        .context-menu.show {
            display: block;
        }

        @keyframes menuFadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .context-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-overlay);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s, color 0.1s;
        }

        .context-item:hover {
            background: var(--earth-primary);
            color: var(--surface-deep);
        }
        .context-icon {
            width: .9em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .context-divider {
            height: 1px;
            align-items: center;
            background: var(--border-strong);
            margin: 4px 0;
        }

        .context-item-danger {
            color: var(--danger-color);
        }

        /* Drag and Drop */
        .tree-header.drag-over,
        .file-item.drag-over {
            border-left: 2px solid var(--earth-primary);
            background: var(--earth-dim);
        }

        .today-separator.drag-over,
        .today-footer.drag-over {
            background: var(--earth-dim);
        }

        .tree-header.drop-target {
            outline: 1px solid var(--earth-primary);
            outline-offset: -2px;
            border-radius: 4px;
            background: var(--earth-dimmer);
            animation: dropTargetFade 0.3s ease-in;
            opacity: .5;
        }

        @keyframes dropTargetFade {
            from {
                outline-color: transparent;
            }

            to {
                outline-color: var(--earth-primary);
            }
        }

        [draggable="true"] {
            cursor: grab;
        }

        [draggable="true"]:active {
            cursor: grabbing;
            opacity: 0.6;
            transition: opacity 0.15s ease;
        }

        .rename-input {
            background: var(--surface-deep);
            color: var(--text-active);
            border: 1px solid var(--earth-primary);
            border-radius: 4px;
            padding: 2px 4px;
            font-family: inherit;
            font-size: inherit;
            width: 100%;
            outline: none;
        }

        /* --- Editor --- */
        #main {
            flex: 1;
            min-width: 0; /* Prevent flex child from overflowing viewport */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #editor {
            width: 100%;
            height: 100%;
            padding: 40px 40px 90px 40px;
            background: var(--bg-color);
            color: var(--text-active);
            border: none;
            outline: none;
            font-family: var(--font-stack);
            font-weight: 300;
            font-size: var(--editor-font-size);
            line-height: 1.66;
            resize: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            caret-color: var(--earth-primary);
            scroll-padding-bottom: 90px;
        }

        #editor::placeholder {
            color: var(--text-dim);
            font-style: italic;
            opacity: 0.7;
        }

        
        .editor-toolbar {
            position: absolute;
            /* Sit above iOS home indicator / safe area */
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            opacity: 0.88;
            transition: opacity 0.2s;
            background: var(--surface-raised);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px;
            max-width: calc(100% - 40px);
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            align-items: center;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
            transition: bottom 0.05s ease;
        }

        .editor-toolbar::-webkit-scrollbar {
            display: none;
        }

        .editor-toolbar:hover {
            opacity: 1;
        }

        .tool-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px 13px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-stack);
            font-size: 15px;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .tool-btn-size{
            justify-content: flex-start;
        }

        .tool-btn-size .value{
            justify-content: flex-start;
            display: inline-block;
            min-width: 6ch;
        }

        .tool-btn-md{
            justify-content: flex-start;
        }

        .tool-btn-md .value{
            justify-content: flex-start;
            display: inline-block;
            min-width: 16ch;
        }
        

        .toolbar-separator {
            width: 1px;
            height: 14px;
            background: var(--border-strong);
            opacity: 0.45;
            flex-shrink: 0;
        }
        
        .tool-btn:hover {
            color: var(--text-active);
        }

        .tool-btn:active {
            transform: scale(0.95);
        }

        .tool-btn:focus-visible {
            outline: 1px solid var(--earth-primary);
            outline-offset: 1px;
        }

        #preview {
            display: none;
            width: 100%;
            height: 100%;
            padding: 40px 40px 90px 40px;
            overflow-y: auto;
            color: var(--text-active);
            font-family: var(--font-stack);
            font-size: var(--editor-font-size);
            line-height: 1.66;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            scroll-behavior: smooth;
            scroll-padding-bottom: 90px;
        }

        #preview h1 {
            font-size: 22px;
            color: var(--earth-primary);
            margin: 0 0 12px 0;
            font-weight: 500;
        }

        #preview h2 {
            font-size: 18px;
            color: var(--earth-primary);
            margin: 0 0 10px 0;
            font-weight: 500;
        }

        #preview h3 {
            font-size: 16px;
            color: var(--earth-primary);
            margin: 0 0 8px 0;
            font-weight: 500;
        }

        #preview strong {
            color: var(--text-active);
            font-weight: 600;
        }

        #preview em {
            font-style: italic;
        }

        #preview code {
            background: var(--surface-raised);
            color: var(--bookmark-color);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 14px;
        }

        #preview pre {
            background: var(--surface-raised);
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 8px 0;
        }

        #preview pre code {
            background: none;
            padding: 0;
        }

        #preview a {

        .tool-btn-delete{

        .toolbar-toggle-inline {

        .tool-btn-new {

        }

        .undo-toast {
            position: absolute;

            border-radius: 4px;
            padding: 8px 14px;

            align-items: center;
            gap: 12px;

        .bulk-bar {

        .bulk-btn {

        /* --- Sidebar Footer / Recycle Bin --- */

        .trash-toggle {
            background: transparent;
            border: none;
            color: var(--text-color);

            font-size: 14px;
            padding: 10px 16px;
            text-align: center;
            transition: color 0.15s, background 0.15s;
            font-family: var(--font-stack);
        }

        .trash-toggle:hover {
            color: var(--text-active);
            background: var(--hover-bg);
        }

        .trash-toggle.active {
            color: var(--earth-primary);
        }

        .trash-tree {
            display: none;
            overflow-y: auto;
            max-height: 300px;
            font-size: 13px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-strong) var(--sidebar-bg);
        }

        .trash-tree.show {
            display: block;
        }

        .trash-tree .file-item,
        .trash-tree .tree-header {
            opacity: 0.55;
        }

        .trash-tree .file-item:hover,
        .trash-tree .tree-header:hover {
            opacity: 0.8;
        }

        .trash-tree .star-btn,
        .trash-tree .add-note {
            display: none !important;
        }

        .trash-empty-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--danger-color-muted);
            cursor: pointer;
            font-family: var(--font-stack);
            font-size: 11px;
            padding: 6px 16px;
            text-align: center;
            transition: color 0.15s, background 0.15s;
        }

        .trash-empty-btn:hover {
            color: var(--danger-color);
            background: rgba(255, 139, 139, 0.06);
        }

        .trash-empty-btn.show {
            display: block;
        }

        .tree-header.focused,
        .file-item.focused {
            outline: 2px solid var(--earth-primary);
            outline-offset: -2px;
            background: var(--hover-bg);
            color: var(--text-active)!important;
        }

        .folder-count {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 400;
            font-variant-numeric: tabular-nums;
            background: var(--earth-dimmer);
            padding: 1px 5px;
            border-radius: 8px;
            line-height: 1.3;
            pointer-events: none;
            user-select: none;
            margin-right: 5px;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.8;
            user-select: none;
            animation: emptyFadeIn 0.4s ease-out;
        }

        @keyframes emptyFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state .flag-art {
            font-size: 14px;
            color: var(--earth-primary);
            opacity: 0.85;
            margin-bottom: 16px;
            white-space: pre;
            line-height: 1.4;
            text-shadow: 0 0 20px rgba(207, 142, 109, 0.2);
        }

        .empty-state .hint {
            color: var(--text-dim);
            font-size: 10px;
            font-style: italic;
            opacity: 0.7;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--sidebar-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 5px;
            border: 2px solid var(--sidebar-bg);
            transition: background 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* --- Light Mode Overrides (only rules not handled by CSS vars) --- */
        [data-theme="light"] .control-btn:hover {
            background: var(--active-bg);
            color: var(--text-active);
        }

        [data-theme="light"] .context-item:hover,
        [data-theme="light"] .format-item:hover {
            color: #fff;
        }

        [data-theme="light"] .context-item-danger:hover {
            color: #fff;
        }

        [data-theme="light"] .tool-btn {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border-color);
        }

        [data-theme="light"] .tool-btn:hover {
            background: var(--hover-bg);
            color: var(--text-active);
            border-color: var(--text-color);
        }

        [data-theme="light"] .tool-btn.active {
            background: var(--earth-primary);
            color: #fff;
            border-color: var(--earth-primary);
            box-shadow: 0 0 8px rgba(181, 118, 74, 0.25);
        }

        [data-theme="light"] .format-item:hover .shortcut {
            color: var(--surface-overlay);
        }

        [data-theme="light"] .bulk-btn.danger:hover {
            background: rgba(204, 68, 68, 0.1);
        }

        [data-theme="light"] ::-webkit-scrollbar-thumb {
            background: #c4bdb2;
            border-color: var(--sidebar-bg);
        }

        [data-theme="light"] #editor,
        [data-theme="light"] #preview {
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
        }

        /* --- Focus Visible Rings --- */
        .icon-btn:focus-visible,
        .new-btn:focus-visible,
        /* --- Template Menu --- */
        .template-menu {
            position: absolute;
            bottom: 48px;
            background: var(--surface-overlay);
            border: 1px solid var(--surface-overlay-border);
            border-radius: 4px;
            padding: 4px 0;
            z-index: 100;
            min-width: 180px;
            max-width: 260px;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
            display: none;
            animation: menuFadeIn 0.12s ease-out;
        }

        .template-menu.show {
            display: block;
        }

        .template-menu .context-item {
            font-size: 12px;
        }

        .template-menu .template-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .template-menu .template-delete {
            opacity: 0;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 11px;
            padding: 0 2px;
            transition: opacity 0.15s, color 0.15s;
        }

        .template-menu .context-item:hover .template-delete {
            opacity: 1;
        }

        .template-menu .template-delete:hover {
            color: var(--danger-color);
        }

        .template-save-row {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            gap: 6px;
            flex-shrink: 0;
        }

        .template-name-input {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-active);
            font-family: var(--font-stack);
            font-size: 12px;
            padding: 4px 6px;
            border-radius: 3px;
            outline: none;
            min-width: 0;
        }

        .template-name-input:focus {
            border-color: var(--earth-primary);
        }

        .template-save-confirm {
            color: var(--earth-primary);
            font-size: 12px;
            cursor: pointer;
            font-family: var(--font-stack);
            white-space: nowrap;
        }

        .template-save-confirm:hover {
            color: var(--text-active);
        }

        .template-empty-hint {
            padding: 6px 12px;
            color: var(--text-dim);
            font-size: 11px;
            font-style: italic;
        }

        /*
         * Mobile: prevent Safari auto-zoom + improve touch usability.
         * Safari iOS zooms any input/textarea with font-size < 16px on focus.
         * We enforce a 16px floor on --editor-font-size itself so every element
         * that inherits the variable is safe, and also hard-set all form controls.
         */
        @media (max-width: 480px) {
            :root {
                --editor-font-size: 16px;
            }

            /* Hard floor: even if JS sets a smaller custom-property value,
               inputs stay at 16px minimum to prevent Safari auto-zoom */
            input,
            textarea,
            select,
            #editor {
                font-size: 16px !important;
                font-size: max(var(--editor-font-size, 16px), 16px) !important;
            }

            /* Reduce tap delay on all interactive elements */
            button,
            a,
            input,
            textarea,
            select,
            [role="button"],
            [role="treeitem"] {
                touch-action: manipulation;
            }
        }

        /* --- Reduced Motion (Accessibility) --- */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* --- Responsive: Wide screens --- */
        @media (min-width: 1200px) {
            :root:not([data-writing-boundaries="off"]) #editor,
            :root:not([data-writing-boundaries="off"]) #preview {
                width: min(100%, 780px);
                margin: 0 auto;
                padding-left: 44px;
                padding-right: 44px;
                border-left: none;
                border-right: none;

                background-image:
                    linear-gradient(
                        to bottom,
                        transparent 0,
                        transparent 24px,
                        var(--editor-guide) 64px,
                        var(--editor-guide) calc(100% - 64px),
                        transparent calc(100% - 24px),
                        transparent 100%
                    ),
                    linear-gradient(
                        to bottom,
                        transparent 0,
                        transparent 24px,
                        var(--editor-guide) 64px,
                        var(--editor-guide) calc(100% - 64px),
                        transparent calc(100% - 24px),
                        transparent 100%
                    );

                background-size: 1px 100%, 1px 100%;
                background-position: left top, right top;
                background-repeat: no-repeat, no-repeat;
            }
        }

        /* Hide Writing Boundaries toggle when the effect wouldn't apply */
        @media (max-width: 1199px) {
            #ioToggleBoundaries,
            .boundaries-divider {
                display: none;
            }
        }

        /* --- Responsive: Tablet (sidebar overlay) --- */
        @media (max-width: 1000px) {
            #sidebar {
                width: 0;
                border-right-width: 0;
                /* Overlay: does not push editor content */
                position: fixed;
                top: 0;
                left: 0;
                z-index: 20;
                height: 100%;
                height: 100dvh;
            }

            #sidebar:not(.sidebar-collapsed) {
                width: 280px;
                border-right-width: 1px;
            }

            .sidebar-backdrop.show {
                display: block;
            }

            .item-controls,
            .star-btn {
                opacity: .2;
            }

            .tree-header[data-drop-type="month"] .item-controls {
                display: flex;
            }

            .item-controls {
                display: flex;
            }

            #editor,
            #preview {
                padding: 28px 28px 80px 28px;
            }

            .tool-label-long {
                display: none;
            }

            .tool-label-short {
                display: inline;
            }

            .save-indicator {
                bottom: 2px;
            }
        }

        /* --- Responsive: Small tablet / large phone --- */
        @media (max-width: 600px) {

            .editor-toolbar {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: auto;
                /* Use 100% (not 100vw) to avoid scrollbar/safe-area overflow */
                max-width: calc(100% - 24px);
                padding: 4px 6px;
                gap: 6px;
                display: flex;
                align-items: center;
            }

            .tool-btn {
                padding: 6px 8px;
                font-size: 16px;
                flex: 0 0 auto;
                min-width: 0;
                justify-content: center;
                white-space: nowrap;
                padding: 8px 10px;
                min-height: 44px;
                touch-action: manipulation;
            }

            /* 44px minimum touch targets for all interactive elements */
            .icon-btn,
            .new-btn {
                min-height: 44px;
                touch-action: manipulation;
            }

            .icon-btn {
                width: 44px;
                height: 44px;
            }

            .new-btn {
                height: 44px;
                padding: 0 12px;
            }

            .toolbar-separator {
                height: 12px;
                margin: 0;
                flex: 0 0 1px;
            }

            .save-indicator {
                bottom: 2px;
            }

            /* Increase height for folders in mobile */
            .file-item, .tree-header, .trash-tree {
                min-height: 44px!important;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            /* Sidebar internal scrolling on iOS */
            .file-tree {
                -webkit-overflow-scrolling: touch;
            }

            
            /* 16px prevents Safari auto-zoom on focus */
            .search-input {
                font-size: 16px;
                padding: 10px 28px 10px 10px;
            }
        }

        /* --- Responsive: Mobile --- */
        @media (max-width: 480px) {

            .editor-toolbar {
                left: 8px;
                right: 8px;
                /* Ensure toolbar sits above iOS home indicator */
                bottom: calc(12px + env(safe-area-inset-bottom, 0px));
                transform: none;
                padding: 4px;
                gap: 4px;
            }

            /* Full-screen overlay drawer on phones */
            #sidebar:not(.sidebar-collapsed) {
                width: 100%;
                max-width: 100%;
                border-right-width: 0;
                border-radius: 0;
            }

            #editor,
            #preview {
                padding: 20px 16px 80px 16px;
            }




            .save-indicator {
                bottom: calc(92px + env(safe-area-inset-bottom, 0px));
            }

            #editor,
            #preview {
                padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
                scroll-padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
            }

            /* Show close button in full-width sidebar drawer */
            .sidebar-close-btn {
                display: inline-flex !important;
            }
        }



    </style>

<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="header-top">
                <span class="sidebar-title">imminote &#10084;</span>
                <div class="actions">
                    <button class="icon-btn" id="ioMenuBtn" title="import / export"
                        aria-label="Import and Export menu">&#8942;</button>
                    <button class="icon-btn" id="filterBtn" style="padding-bottom: 2px;" title="show Bookmarked Only"
                        aria-label="Filter bookmarked notes">&#9733;</button>
                    <button class="icon-btn sidebar-close-btn" onclick="toggleSidebar()" title="Close sidebar"
                        aria-label="Close sidebar">&#10005;</button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="search..."
                    aria-label="Search notes">
                <button class="search-clear" id="searchClear" aria-label="Clear search">&#10005;</button>
            </div>
        </div>
        <div class="file-tree" id="fileTree" tabindex="0" role="tree" aria-label="notes tree"></div>
        <div class="bulk-bar" id="bulkBar">
            <span class="bulk-count" id="bulkCount">0 selected</span>
            <button class="bulk-btn" id="bulkBookmark">&#9733; bookmark</button>
            <button class="bulk-btn danger" id="bulkDelete">delete</button>
            <button class="bulk-btn" id="bulkClear">Clear</button>
        </div>
        <div class="sidebar-footer" id="sidebarFooter">
            <button class="trash-toggle" id="trashToggle" aria-label="trash">trash</button>
            <button class="trash-empty-btn" id="trashEmptyBtn">empty all</button>
            <div class="trash-tree" id="trashTree"></div>
        </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <main id="main">
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle sidebar (Ctrl+\)"
            aria-label="Toggle sidebar">&#9776;</button>
        <textarea id="editor" placeholder="Type to create a note..." spellcheck="false"></textarea>
        <div id="preview"></div>

        <div class="editor-toolbar" id="toolbar">
            <button class="tool-btn toolbar-toggle-inline" onclick="toggleSidebar()" aria-label="Toggle sidebar">&#9776;</button>

            <div class="toolbar-separator"></div>

            <button class="tool-btn tool-btn-new" onclick="prepareGhostNote()" aria-label="Create new note">+ note</button>
            <button class="tool-btn" id="templateBtn" onclick="toggleTemplateMenu()" aria-label="templates">templates</button>

            <div class="toolbar-separator"></div>

            <button class="tool-btn tool-btn-size" id="fontSizeBtn" onclick="cycleFontSize()" aria-label="Font size"> <span class="tool-label-long">text: </span>
                <span class="value">medium</span></button>
            <button class="tool-btn tool-btn-md" id="previewToggle" onclick="togglePreview()"
                aria-label="Toggle markdown preview"><span class="tool-label-long">markdown preview</span><span class="tool-label-short">preview</span></button>

            <div class="toolbar-separator"></div>

            <button class="tool-btn tool-btn-delete" id="toolbarTrash" onclick="deleteCurrentNote()" title="Delete note (Ctrl+Backspace)" aria-label="Delete current note">delete</button>
        </div>

        <div id="templateMenu" class="template-menu" role="menu" aria-label="Templates"></div>

        <div class="word-count" id="wordCount"></div>
        <div class="save-indicator" id="saveIndEl">saved</div>
        <div class="undo-toast" id="undoToast" role="alert" aria-live="assertive">
            <span id="undoMessage">Deleted.</span>
            <button class="undo-btn" id="undoBtn" onclick="undoDelete()">undo</button>
        </div>
    </main>

    <input type="file" id="importFile" accept=".json" style="display:none">

    <div id="contextMenu" class="context-menu" role="menu" aria-label="Note actions">
        <div class="context-item" id="ctxNewNote" style="display: none;"><span>+</span> new note</div>
        <div class="context-item" id="ctxNewFolder" style="display: none;"><span>+</span> new folder</div>
        <div class="context-item" id="ctxFavorite" style="display: none;"><span>&#9733;</span><span id="ctxFavoriteLabel">favorite</span></div>
        <div class="context-item" id="ctxAnchor" style="display: none;"></div>

    <script>
        // --- State ---
        let notes = [];
        let folders = [];
        let folderAliases = {};
        let openFolders = new Set();
        let currentNoteId = null;
        let contextTarget = null;
        let searchQuery = "";
        let filterBookmarked = false;
        let noteById = new Map();
        let notesByDate = new Map();
        let notesByMonth = new Map(); // "YYYY-MM" -> Set of dateKeys
        let notesByFolderId = new Map();
        let folderById = new Map();
        let childFolders = new Map();
        let notesByDateDirect = new Map();

        let focusedItemIndex = -1;
        let pendingDelete = null;
        let undoTimer = null;
        let selectedNoteIds = new Set();
        let lastClickedNoteId = null;

        let deletedFolders = [];
        let trashExpanded = false;
        let moveMode = null; // { type: 'note'|'customFolder', noteIds: [], folderId: null }
        const GHOST_PLACEHOLDERS = [
