        /* Mobile gets larger font sizes to prevent Safari auto-zoom and improve readability */
        const isMobileDevice = window.matchMedia('(max-width: 480px)').matches;
        const FONT_SIZES = isMobileDevice
            ? { small: '16px', medium: '18px', large: '20px' }
            : { small: '13px', medium: '15px', large: '18px' };
        const FONT_SIZE_ORDER = ['small', 'medium', 'large'];

        // --- DOM Elements ---
        const editor = document.getElementById('editor');
        const fileTree = document.getElementById('fileTree');
        const indicator = document.querySelector('.save-indicator');
        const contextMenu = document.getElementById('contextMenu');
        const ctxAnchor = document.getElementById('ctxAnchor');
        if (ctxAnchor) {
            ctxAnchor.innerHTML = `${getAnchorIconMarkup()}<span id="ctxAnchorLabel">anchor note</span>`;
        }
        const ctxAnchorLabel = document.getElementById('ctxAnchorLabel');
        const searchInput = document.getElementById('searchInput');
        const filterBtn = document.getElementById('filterBtn');
        const ioMenu = document.getElementById('ioMenu');
        const ioMenuBtn = document.getElementById('ioMenuBtn');
        const importFileInput = document.getElementById('importFile');
        const templateMenu = document.getElementById('templateMenu');
        const wordCountEl = document.getElementById('wordCount');
        const saveIndEl = document.getElementById('saveIndEl');
        const ioBoundaryLabel = document.getElementById('ioBoundaryLabel');
        const ioBoundaryIcon = document.getElementById('ioBoundaryIcon');
        const ioThemeIcon = document.getElementById('ioThemeIcon');
        const ioThemeLabel = document.getElementById('ioThemeLabel');
        // Returns HH:MM key for minute-level folder grouping
        function getMinuteKey(date) {
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
        }

        function getDateKeyFromTimestamp(timestamp) {
            return new Date(timestamp).toLocaleDateString('en-CA');
        }

        function getMonthKey(dateKey) {
            return dateKey.substring(0, 7); // "YYYY-MM-DD" -> "YYYY-MM"
        }

        function isCustomFolderNote(note) {
            if (!note || !note.folderId) return false;
            return folderById.has(note.folderId) || folders.some(folder => folder.id === note.folderId);
        }

        function normalizeNoteRecord(note, contentLoaded = false) {
            return {
                id: note.id,
                timestamp: note.timestamp,
                content: note.content || "",
                customTitle: note.customTitle || null,
                isBookmarked: !!note.isBookmarked,
                folderId: note.folderId || null,
                anchoredDateKey: note.anchoredDateKey || null,
                anchorOriginFolderId: note.anchorOriginFolderId || null,
                _contentLoaded: contentLoaded
            };
        }

        function isAnchoredNote(note) {
            return !!(note && note.anchoredDateKey);
        }

        // Returns the container ID that a note would anchor to.
        // - Custom folder note → its folderId (the folder it lives in)
        // - Date-level note (folderId="date:YYYY-MM-DD") → the dateKey
        // - Temporal note (no folderId) → dateKey from its timestamp
        function getAnchorTargetKey(note) {
            if (!note) return null;
            if (isCustomFolderNote(note)) return note.folderId;
            if (note.folderId && note.folderId.startsWith('date:')) return note.folderId.substring(5);
            if (!note.folderId) return getDateKeyFromTimestamp(note.timestamp);
            return null;
        }

        function canAnchorNote(note) {
            return !!getAnchorTargetKey(note);
        }

        function openFolderChain(folderId) {
            let fid = folderId;
            while (fid) {
                openFolders.add(fid);
                const folder = folderById.get(fid);
                fid = folder ? folder.parentId : null;
            }
        }

        // Runs on load. Ensures only one note is anchored per container,
        // and that anchor state is consistent.
        function enforceAnchorConstraints() {
            const anchoredByKey = new Set(); // tracks which containers already have an anchor
            let changed = false;

            notes.forEach(note => {
                if (!note.anchoredDateKey) {
                    // Not anchored — clean up stale origin if present
                    if (note.anchorOriginFolderId !== null) {
                        note.anchorOriginFolderId = null;
                        changed = true;
                    }
                    return;
                }

                const targetKey = note.anchoredDateKey;

                // Only one anchor per container — if duplicate, un-anchor this one
                if (anchoredByKey.has(targetKey)) {
                    note.folderId = note.anchorOriginFolderId || null;
                    note.anchoredDateKey = null;
                    note.anchorOriginFolderId = null;
                    changed = true;
                    return;
                }

                anchoredByKey.add(targetKey);

                // For non-custom-folder notes, ensure folderId is 'date:' + targetKey
                // For custom folder notes, folderId stays as the folder ID
                if (!isCustomFolderNote(note) && !folderById.has(targetKey)) {
                    const anchoredFolderId = 'date:' + targetKey;
                    if (note.folderId !== anchoredFolderId) {
                        note.folderId = anchoredFolderId;
                        changed = true;
                    }
                }
            });

            return changed;
        }

        function setNoteAnchored(note, shouldAnchor) {
            if (!note) return false;

            if (shouldAnchor) {
                const targetKey = getAnchorTargetKey(note);
                if (!targetKey) return false;

                // Un-anchor any other note already anchored to the same container
                notes.forEach(other => {
                    if (other.id !== note.id && other.anchoredDateKey === targetKey) {
                        setNoteAnchored(other, false);
                    }
                });

                const oldFolderId = note.folderId;
                const oldTimestamp = note.timestamp;

                // Remember where the note came from so unanchor can restore it
                if (!note.anchoredDateKey) {
                    note.anchorOriginFolderId = note.folderId || null;
                }

                // Set the anchor marker
                note.anchoredDateKey = targetKey;

                // For custom folder notes: keep folderId as-is (note stays in its folder)
                // For temporal/date notes: move to date-level slot
                if (!isCustomFolderNote(note)) {
                    note.folderId = 'date:' + targetKey;
                    openFolders.add(targetKey);
                } else {
                    openFolderChain(note.folderId);
                }

                indexUpdate(note, oldFolderId, oldTimestamp);
                return true;
            }

            if (!note.anchoredDateKey) return false;

            const oldFolderId = note.folderId;
            const oldTimestamp = note.timestamp;
            note.folderId = note.anchorOriginFolderId || null;
            note.anchoredDateKey = null;
            note.anchorOriginFolderId = null;

            if (note.folderId && note.folderId.startsWith('date:')) {
                const dk = note.folderId.substring(5);
                openFolders.add(getMonthKey(dk));
                openFolders.add(dk);
            } else if (note.folderId) {
                openFolderChain(note.folderId);
            } else {
                const dateKey = getDateKeyFromTimestamp(note.timestamp);
                openFolders.add(getMonthKey(dateKey));
                openFolders.add(dateKey);
            }

            indexUpdate(note, oldFolderId, oldTimestamp);
            return true;
        }

        function getAnchorIconMarkup(iconClass = 'anchor-icon') {
            return `<svg viewBox="0 0 24 24" class="${iconClass}" aria-hidden="true"><path fill="currentColor" d="M12 2a3 3 0 0 0-1 5.83V10H8v2h3v6.9a5 5 0 0 1-3-4.58H6A7 7 0 0 0 11 21v1h2v-1a7 7 0 0 0 5-6.68h-2A5 5 0 0 1 13 18.9V12h3v-2h-3V7.83A3 3 0 1 0 12 2Zm0 2a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/></svg>`;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function debounce(fn, ms) {
            let timer;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), ms);
            };
        }

        function parseStoredJSON(key, fallbackValue, validator) {
            const raw = localStorage.getItem(key);
            if (!raw) return fallbackValue;
            try {
                const parsed = JSON.parse(raw);
                if (validator && !validator(parsed)) {
                    throw new Error('Stored value has unexpected shape');
                }
                return parsed;
            } catch (err) {
                console.warn(`Ignoring invalid localStorage payload for "${key}"`, err);
                return fallbackValue;
            }
        }

        function decodeHTMLEntities(str) {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = str;
            return textarea.value;
        }

        function sanitizePreviewHref(rawHref) {
            const decoded = decodeHTMLEntities(String(rawHref || '').trim());
            if (!decoded) return null;
            try {
                const parsed = new URL(decoded, window.location.origin);
                const protocol = parsed.protocol.toLowerCase();
                if (protocol === 'http:' || protocol === 'https:' || protocol === 'mailto:' || protocol === 'tel:') {
                    return parsed.href;
                }
            } catch (err) { }
            return null;
        }

        function linkifyPlainUrls(html) {
            const placeholders = [];
            const stash = (match) => {
                const token = `__IMMINOTE_LINKIFY_PLACEHOLDER_${placeholders.length}__`;
                placeholders.push(match);
                return token;
            };

            // Do not linkify inside code/pre blocks or existing links.
            html = html.replace(/<pre><code>[\s\S]*?<\/code><\/pre>/g, stash);
            html = html.replace(/<code>[^<]*<\/code>/g, stash);
            html = html.replace(/<a\s+[^>]*>[\s\S]*?<\/a>/g, stash);

            html = html.replace(/(^|[\s(>])((?:https?:\/\/|www\.)[^\s<]+)/gm, (match, prefix, rawUrl) => {
                let urlText = rawUrl;
                let trailing = '';
                const trailingMatch = urlText.match(/[.,!?;:)]+$/);
                if (trailingMatch) {
                    trailing = trailingMatch[0];
                    urlText = urlText.slice(0, -trailing.length);
                }
                if (!urlText) return match;

                const candidate = urlText.startsWith('www.') ? `https://${urlText}` : urlText;
                const safeHref = sanitizePreviewHref(candidate);
                if (!safeHref) return match;

                return `${prefix}<a href="${escapeHTML(safeHref)}" target="_blank" rel="noopener noreferrer">${escapeHTML(urlText)}</a>${escapeHTML(trailing)}`;
            });

            placeholders.forEach((value, index) => {
                html = html.replace(`__IMMINOTE_LINKIFY_PLACEHOLDER_${index}__`, value);
            });

            return html;
        }

        function isDateLevelNote(note) {
            return note.folderId && note.folderId.startsWith('date:');
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function applyFontSize(size) {
        currentFontSize = size;
        document.documentElement.style.setProperty('--editor-font-size', FONT_SIZES[size]);

        const btn = document.getElementById('fontSizeBtn');
            if (btn) {
                const valueEl = btn.querySelector('.value');
            if (valueEl) valueEl.textContent = size;
        }

        localStorage.setItem('imminote_editor_fontsize', size);
        }

        function cycleFontSize() {
            const next = FONT_SIZE_ORDER[(FONT_SIZE_ORDER.indexOf(currentFontSize) + 1) % 3];
            applyFontSize(next);
        }

        function updateWordCount() {
            const text = editor.value.trim();
            if (!text) {
                wordCountEl.classList.remove('show');
                return;
            }
            const words = text.split(/\s+/).length;
            const chars = text.length;
            wordCountEl.textContent = words + ' word' + (words !== 1 ? 's' : '') + ' \u00b7 ' + chars + ' char' + (chars !== 1 ? 's' : '');
            wordCountEl.classList.add('show');
        }

        // --- Init ---
        function init() {
            // One-time migration: checkpoint_ -> imminote_ localStorage keys
            const keyMigrations = [
                ['checkpoint_notes_v2', 'imminote_notes_v2'],
                ['checkpoint_aliases', 'imminote_aliases'],
                ['checkpoint_folders', 'imminote_folders'],
                ['checkpoint_editor_fontsize', 'imminote_editor_fontsize'],
                ['checkpoint_theme', 'imminote_theme'],
                ['checkpoint_writing_boundaries', 'imminote_writing_boundaries'],
                ['checkpoint_sidebar_collapsed', 'imminote_sidebar_collapsed'],
                ['checkpoint_templates', 'imminote_templates']
            ];
            keyMigrations.forEach(([oldKey, newKey]) => {
                const oldValue = localStorage.getItem(oldKey);
                if (oldValue !== null) {
                    if (localStorage.getItem(newKey) === null) {
                        localStorage.setItem(newKey, oldValue);
                    }
                    localStorage.removeItem(oldKey);
                }
            });

            // Load notes: try manifest (new format) first, fallback to monolithic (old format)
            const manifest = parseStoredJSON('imminote_manifest', null, Array.isArray);
            let needsAnchorNormalization = false;
            if (manifest) {
                // New format: metadata from manifest, content loaded on demand
                notes = manifest.map(m => normalizeNoteRecord({
                    ...m,
                    content: ''
                }, false));
            } else {
                // Legacy format: single array with full content
                notes = parseStoredJSON('imminote_notes_v2', [], Array.isArray).map(n => normalizeNoteRecord(n, true));
                if (notes.length > 0) {
                    migrateToPerNoteStorage();
                }
            }
            folderAliases = parseStoredJSON(
                'imminote_aliases',
                {},
                value => value !== null && typeof value === 'object' && !Array.isArray(value)
            );
            folders = parseStoredJSON('imminote_folders', [], Array.isArray);
            deletedNotes = parseStoredJSON('imminote_deleted', [], Array.isArray).map(n => ({
                ...n, content: '', _contentLoaded: false
            }));
            deletedFolders = parseStoredJSON('imminote_deleted_folders', [], Array.isArray);
            purgeExpiredTrash();
            // One-time recovery: fix notes with broken 'date:' folderId from bad anchor attempt
            notes.forEach(n => {
                if (n.folderId && n.folderId.startsWith('date:')) {
                    const dk = n.folderId.substring(5);
                    if (!/^\d{4}-\d{2}-\d{2}$/.test(dk)) {
                        // Garbage dateKey — restore from anchorOriginFolderId or make temporal
                        n.folderId = n.anchorOriginFolderId || null;
                        n.anchoredDateKey = null;
                        n.anchorOriginFolderId = null;
                    }
                }
            });
            needsAnchorNormalization = enforceAnchorConstraints();

            // Restore font size preference
            const savedFontSize = localStorage.getItem('imminote_editor_fontsize');
            applyFontSize(savedFontSize && FONT_SIZES[savedFontSize] ? savedFontSize : 'medium');

            // Restore theme preference (FOUC handled by inline script in <head>)
            updateThemeButton(localStorage.getItem('imminote_theme') || 'light');

            // Restore writing boundary preference (default: on)
            const savedWritingBoundaries = localStorage.getItem('imminote_writing_boundaries');
            applyWritingBoundaries(savedWritingBoundaries !== '0', false);
            // Restore sidebar collapsed state (auto-collapse on small screens)
            const isSmallScreen = window.matchMedia('(max-width: 1000px)').matches;
            if (localStorage.getItem('imminote_sidebar_collapsed') === '1' || isSmallScreen) {
                sidebarCollapsed = true;
                document.getElementById('sidebar').classList.add('sidebar-collapsed');
            }
            updateBackdrop();

            // Backdrop click closes sidebar
            document.getElementById('sidebarBackdrop').addEventListener('click', function () {
                if (!sidebarCollapsed) toggleSidebar();
            });

            // Update backdrop on resize
            window.addEventListener('resize', updateBackdrop);


            
            // Raise toolbar above virtual keyboard on mobile.
            // When the keyboard opens, visualViewport.height shrinks;
            // we reposition the toolbar to sit just above the keyboard.
            if (window.visualViewport) {
                const KEYBOARD_THRESHOLD = 150;
                function adjustToolbarForKeyboard() {
                    const vv = window.visualViewport;
                    const heightDiff = window.innerHeight - vv.height;
                    if (heightDiff > KEYBOARD_THRESHOLD) {
                        // Keyboard is up: fix toolbar, wordcount, save indicator just above it
                        toolbar.style.bottom = (window.innerHeight - vv.height - vv.offsetTop + 20) + 'px';
                        wordCountEl.style.bottom = (window.innerHeight - vv.height - vv.offsetTop + 2) + 'px';
                        saveIndEl.style.bottom = (window.innerHeight - vv.height - vv.offsetTop + 2) + 'px';
                    } else {
                        // Keyboard, wordcount, save indicator dismissed: restore CSS-defined positioning
                        toolbar.style.bottom = '';
                        wordCountEl.style.bottom = '';
                        saveIndEl.style.bottom = '';
                    }
                }
                window.visualViewport.addEventListener('resize', adjustToolbarForKeyboard);
                window.visualViewport.addEventListener('scroll', adjustToolbarForKeyboard);
            }

            // Load templates
            loadTemplates();

            // Migration: HH:MM:SS alias keys ->HH:MM (one-time, idempotent)
            const migratedAliases = {};
            let needsMigration = false;
            Object.keys(folderAliases).forEach(key => {
                if (/^\d{2}:\d{2}:\d{2}$/.test(key)) {
                    const minuteKey = key.substring(0, 5);
                    if (!migratedAliases[minuteKey]) {
                        migratedAliases[minuteKey] = folderAliases[key];
                    }
                    needsMigration = true;
                } else {
                    migratedAliases[key] = folderAliases[key];
                }
            });
            if (needsMigration) {
                folderAliases = migratedAliases;
            }

            // Migration: strip isDateNote flag (replaced by folderId system)
            let needsDateNoteMigration = false;
            notes.forEach(n => {
                if (n.isDateNote) {
                    delete n.isDateNote;
                    needsDateNoteMigration = true;
                }
            });

            if (needsMigration || needsDateNoteMigration || needsAnchorNormalization) {
                saveData();
            }

            if (notes.length > 0) {
                notes.sort((a, b) => b.timestamp - a.timestamp);
                rebuildIndexes();
                loadNote(notes[0].id);
            } else {
                rebuildIndexes();
                prepareGhostNote();
            }
            renderTrash();

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.control-btn') && !e.target.closest('.context-menu')) {
                    contextMenu.classList.remove('show');
                }
                if (!e.target.closest('#ioMenuBtn') && !e.target.closest('#ioMenu')) {
                    ioMenu.classList.remove('show');
                }
                if (!e.target.closest('#templateBtn') && !e.target.closest('#templateMenu') && !templateSaveMode) {
                    templateMenu.classList.remove('show');
                }
            });

            if (searchInput) {
                const searchClearBtn = document.getElementById('searchClear');
                const debouncedSearch = debounce(() => {
                    searchQuery = searchInput.value.toLowerCase();
                    searchClearBtn.classList.toggle('show', searchInput.value.length > 0);
                    renderSidebar();
                }, 150);
                searchInput.addEventListener('input', debouncedSearch);
                searchClearBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    searchQuery = '';
                    searchClearBtn.classList.remove('show');
                    renderSidebar();
                    searchInput.focus();
                });
            }

            if (filterBtn) {
                filterBtn.addEventListener('click', () => {
                    filterBookmarked = !filterBookmarked;
                    filterBtn.classList.toggle('active', filterBookmarked);
                    renderSidebar();
                });
            }

            // Bulk action buttons
            document.getElementById('bulkDelete').addEventListener('click', () => {
                performBulkDelete([...selectedNoteIds]);
            });
            document.getElementById('bulkBookmark').addEventListener('click', () => {
                const ids = [...selectedNoteIds];
                const anyUnbookmarked = ids.some(id => { const n = noteById.get(id); return n && !n.isBookmarked; });
                ids.forEach(id => { const n = noteById.get(id); if (n) n.isBookmarked = anyUnbookmarked; });
                saveData();
                renderSidebar();
            });
            document.getElementById('bulkClear').addEventListener('click', () => clearSelection());

            // Trash toggle + empty
            document.getElementById('trashToggle').addEventListener('click', () => {
                trashExpanded = !trashExpanded;
                renderTrash();
            });
            document.getElementById('trashEmptyBtn').addEventListener('click', () => {
                if (deletedNotes.length === 0) return;
                if (confirm('permanently delete all ' + deletedNotes.length + ' items in the recycle bin?')) {
                    emptyAllTrash();
                }
            });

            // Editor right-click format menu
            const formatMenu = document.getElementById('formatMenu');
            editor.addEventListener('contextmenu', (e) => {
                if (!currentNoteId && !editor.value.trim()) return; // no formatting in empty ghost
                e.preventDefault();

                formatMenu.style.top = '-9999px';
                formatMenu.style.left = '-9999px';
                formatMenu.classList.add('show');

                const menuRect = formatMenu.getBoundingClientRect();
                const viewportW = window.innerWidth;
                const viewportH = window.innerHeight;

                let top = e.clientY;
                let left = e.clientX;
                if (top + menuRect.height > viewportH) top = e.clientY - menuRect.height;
                if (left + menuRect.width > viewportW) left = e.clientX - menuRect.width;

                formatMenu.style.top = `${Math.max(0, top)}px`;
                formatMenu.style.left = `${Math.max(0, left)}px`;
            });

            formatMenu.querySelectorAll('.format-item').forEach(item => {
                item.addEventListener('click', () => {
                    applyFormat(item.getAttribute('data-format'));
                    formatMenu.classList.remove('show');
                });
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.format-menu')) {
                    formatMenu.classList.remove('show');
                }
            });

            document.addEventListener('keydown', (e) => {
                const isMod = e.ctrlKey || e.metaKey;

                if (isMod && e.key === 'n') {
                    e.preventDefault();
                    prepareGhostNote();
                    return;
                }

                if (isMod && e.key === 's') {
                    e.preventDefault();
                    if (currentNoteId) {
                        indicator.classList.add('show');
                        setTimeout(() => indicator.classList.remove('show'), 1500);
                    }
                    return;
                }

                if (isMod && e.shiftKey && e.key === 'F') {
                    e.preventDefault();
                    if (sidebarCollapsed) toggleSidebar();
                    searchInput.focus();
                    searchInput.select();
                    return;
                }

                if (isMod && e.shiftKey && e.key === 'E') {
                    e.preventDefault();
                    editor.focus();
                    return;
                }

                if (isMod && e.key === '\\') {
                    e.preventDefault();
                    toggleSidebar();
                    return;
                }

                if (isMod && e.key === 'Backspace') {
                    e.preventDefault();
                    if (currentNoteId) {
                        performDelete('file', currentNoteId);
                    }
                    return;
                }

                // Formatting shortcuts (when editor is focused)
                if (isMod && document.activeElement === editor && !previewMode) {
                    if (e.key === 'b') { e.preventDefault(); applyFormat('bold'); return; }
                    if (e.key === 'i') { e.preventDefault(); applyFormat('italic'); return; }
                    if (e.key === 'h') { e.preventDefault(); applyFormat('heading'); return; }
                    if (e.key === '`') { e.preventDefault(); applyFormat('code'); return; }
                    if (e.key === 'k') { e.preventDefault(); applyFormat('link'); return; }
                    if (e.key === 'l') { e.preventDefault(); applyFormat('list'); return; }
                }

                // Tab key in editor: insert/remove indent
                if (e.key === 'Tab' && document.activeElement === editor && !previewMode) {
                    e.preventDefault();
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    const val = editor.value;
                    if (e.shiftKey) {
                        // Outdent: remove leading spaces on current line
                        const lineStart = val.lastIndexOf('\n', start - 1) + 1;
                        const lineContent = val.substring(lineStart);
                        const spaces = lineContent.match(/^ {1,4}/);
                        if (spaces) {
                            editor.value = val.substring(0, lineStart) + val.substring(lineStart + spaces[0].length);
                            editor.selectionStart = editor.selectionEnd = Math.max(lineStart, start - spaces[0].length);
                        }
                    } else {
                        // Indent: insert 4 spaces
                        editor.value = val.substring(0, start) + '    ' + val.substring(end);
                        editor.selectionStart = editor.selectionEnd = start + 4;
                    }
                    editor.focus();
                    editor.dispatchEvent(new Event('input'));
                    return;
                }

                // Escape key: dismiss menus, clear selection
                if (e.key === 'Escape') {
                    const formatMenu = document.getElementById('formatMenu');
                    const anyMenuOpen = contextMenu.classList.contains('show') ||
                        ioMenu.classList.contains('show') ||
                        formatMenu.classList.contains('show');
                    contextMenu.classList.remove('show');
                    ioMenu.classList.remove('show');
                    formatMenu.classList.remove('show');
                    if (selectedNoteIds.size > 0) {
                        clearSelection();
                    } else if (!anyMenuOpen) {
                        editor.focus();
                    }
                    return;
                }

                // Keyboard navigation in sidebar
                if (fileTree.contains(document.activeElement) || document.activeElement === fileTree) {
                    const items = getVisibleItems();
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        const next = focusedItemIndex < items.length - 1 ? focusedItemIndex + 1 : 0;
                        setFocusedItem(next);
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        const prev = focusedItemIndex > 0 ? focusedItemIndex - 1 : items.length - 1;
                        setFocusedItem(prev);
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        activateFocusedItem();
                    }
                }
            });

            // --- Import/Export Three-Dot Menu ---
            ioMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = ioMenu.classList.contains('show');
                contextMenu.classList.remove('show');
                document.getElementById('formatMenu').classList.remove('show');

                if (isOpen) {
                    ioMenu.classList.remove('show');
                    return;
                }

                const btnRect = ioMenuBtn.getBoundingClientRect();
                let top = btnRect.bottom + 4;
                let left = btnRect.left;

                ioMenu.style.top = '-9999px';
                ioMenu.style.left = '-9999px';
                ioMenu.classList.add('show');

                const menuRect = ioMenu.getBoundingClientRect();
                if (top + menuRect.height > window.innerHeight) top = btnRect.top - menuRect.height - 4;
                if (left + menuRect.width > window.innerWidth) left = btnRect.right - menuRect.width;

                ioMenu.style.top = `${Math.max(0, top)}px`;
                ioMenu.style.left = `${Math.max(0, left)}px`;
            });

            document.getElementById('ioExport').addEventListener('click', () => {
                ioMenu.classList.remove('show');
                ensureAllContentLoaded();
                const data = {
                    version: 'imminote-backup-v2',
                    exportedAt: new Date().toISOString(),
                    notes: notes.map(n => ({
                        id: n.id,
                        timestamp: n.timestamp,
                        content: n.content,
                        customTitle: n.customTitle,
                        isBookmarked: n.isBookmarked,
                        folderId: n.folderId,
                        anchoredDateKey: n.anchoredDateKey,
                        anchorOriginFolderId: n.anchorOriginFolderId
                    })),
                    folderAliases: folderAliases,
                    folders: folders,
                    deletedNotes: deletedNotes.map(n => {
                        ensureContentLoaded(n);
                        return {
                            id: n.id, timestamp: n.timestamp, content: n.content,
                            customTitle: n.customTitle, isBookmarked: n.isBookmarked,
                            folderId: n.folderId, deletedAt: n.deletedAt
                        };
                    }),
                    deletedFolders: deletedFolders
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `imminote-backup-${new Date().toLocaleDateString('en-CA')}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });

            document.getElementById('ioImport').addEventListener('click', () => {
                ioMenu.classList.remove('show');
                importFileInput.click();
            });

            document.getElementById('ioToggleBoundaries').addEventListener('click', () => {
                toggleWritingBoundaries();
            });
            document.getElementById('ioToggleTheme').addEventListener('click', () => {
                toggleTheme();
            });
            document.getElementById('ioNewFolder').addEventListener('click', () => {
                ioMenu.classList.remove('show');
                const newFolder = {
                    id: generateId(),
                    name: "New Folder",
                    parentId: null,
                    type: 'custom',
                    sortOrder: Date.now(),
                    isBookmarked: false
                };
                folders.push(newFolder);
                openFolders.add(newFolder.id);
                saveData();
                indexAddFolder(newFolder);
                renderSidebar();
            });

            importFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);

                        if (!data.notes || !Array.isArray(data.notes)) {
                            alert('Invalid backup file: missing notes array.');
                            return;
                        }

                        const replace = confirm(
                            'Import mode:\n\nOK = REPLACE all current data\nCancel = MERGE with existing data'
                        );

                        if (replace) {
                            // Remove old per-note storage
                            notes.forEach(n => removeNoteStorage(n.id));
                            deletedNotes.forEach(n => removeNoteStorage(n.id));
                            notes = data.notes.map(n => normalizeNoteRecord(n, true));
                            folderAliases = data.folderAliases || {};
                            folders = data.folders || [];
                            deletedNotes = (data.deletedNotes || []).map(n => ({ ...n, _contentLoaded: !!n.content }));
                            deletedFolders = data.deletedFolders || [];
                        } else {
                            const existingIds = new Set(notes.map(n => n.id));
                            const newNotes = data.notes
                                .filter(n => !existingIds.has(n.id))
                                .map(n => normalizeNoteRecord(n, true));
                            notes = notes.concat(newNotes);
                            if (data.folderAliases) {
                                Object.assign(folderAliases, data.folderAliases);
                            }
                            if (data.folders) {
                                const existingFolderIds = new Set(folders.map(f => f.id));
                                const newFolders = data.folders.filter(f => !existingFolderIds.has(f.id));
                                folders = folders.concat(newFolders);
                            }
                            if (data.deletedNotes) {
                                const existingDeletedIds = new Set(deletedNotes.map(n => n.id));
                                data.deletedNotes.filter(n => !existingDeletedIds.has(n.id) && !existingIds.has(n.id)).forEach(n => {
                                    deletedNotes.push({ ...n, _contentLoaded: !!n.content });
                                });
                            }
                            if (data.deletedFolders) {
                                const existingDFIds = new Set(deletedFolders.map(f => f.id));
                                data.deletedFolders.filter(f => !existingDFIds.has(f.id)).forEach(f => deletedFolders.push(f));
                            }
                        }

                        enforceAnchorConstraints();

                        // Write per-note storage for imported notes
                        notes.forEach(n => {
                            n._contentLoaded = true;
                            localStorage.setItem('imminote_n_' + n.id, n.content);
                        });
                        // Write per-note storage for imported deleted notes
                        deletedNotes.forEach(n => {
                            if (n.content) {
                                localStorage.setItem('imminote_n_' + n.id, n.content);
                            }
                        });
                        notes.sort((a, b) => b.timestamp - a.timestamp);
                        saveData();
                        saveDeletedData();
                        purgeExpiredTrash();
                        rebuildIndexes();
                        renderSidebar();
                        renderTrash();

                        if (notes.length > 0) {
                            loadNote(notes[0].id);
                        } else {
                            prepareGhostNote();
                        }
                    } catch (err) {
                        alert('Failed to parse backup file: ' + err.message);
                    }
                };
                reader.readAsText(file);
                importFileInput.value = '';
            });
        }

        // --- Core Logic ---
        function prepareGhostNote() {
            currentNoteId = null;
            editor.value = "";
            editor.readOnly = false;
            editor.placeholder = GHOST_PLACEHOLDERS[Math.floor(Math.random() * GHOST_PLACEHOLDERS.length)];
            document.getElementById('toolbarTrash').classList.remove('show');

            // Exit preview mode if active
            if (previewMode) {
                previewMode = false;
                editor.style.display = '';
                document.getElementById('preview').style.display = 'none';
                const toggleBtn = document.getElementById('previewToggle');
                if (toggleBtn) { toggleBtn.innerHTML = '<span class="tool-label-long">markdown preview</span><span class="tool-label-short">preview</span>'; toggleBtn.classList.remove('active'); }
            }

            clearSelection();
            editor.focus();
            wordCountEl.classList.remove('show');
            document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.active-parent').forEach(el => el.classList.remove('active-parent'));
        }

        function createRealNoteFromGhost() {
            const now = new Date();
            const newNote = {
                id: now.getTime(),
                timestamp: now.getTime(),
                content: editor.value,
                customTitle: null,
                isBookmarked: false,
                folderId: null,
                anchoredDateKey: null,
                anchorOriginFolderId: null,
                _contentLoaded: true
            };
            notes.unshift(newNote);
            currentNoteId = newNote.id;
            saveNoteContent(newNote);
            saveManifest();
            indexAdd(newNote);

            if (searchQuery || filterBookmarked) {
                searchQuery = "";
                searchInput.value = "";
                filterBookmarked = false;
                filterBtn.classList.remove('active');
            }

            const dateKey = now.toLocaleDateString('en-CA');
            openFolders.add(getMonthKey(dateKey));
            openFolders.add(dateKey);

            justCreatedNoteId = newNote.id;
            justCreatedFolderId = dateKey;
            renderSidebar();
            loadNote(newNote.id);
        }

        function loadNote(id) {
            currentNoteId = id;
            const note = noteById.get(id);

            contextMenu.classList.remove('show');
            editor.readOnly = false;

            if (note) {
                ensureContentLoaded(note);
                editor.value = note.content;
                document.getElementById('toolbarTrash').classList.add('show');

                if (previewMode) {
                    document.getElementById('preview').innerHTML = parseMarkdown(note.content);
                }

                if (isDateLevelNote(note)) {
                    const dateKey = note.folderId.substring(5);
                    openFolders.add(getMonthKey(dateKey));
                    openFolders.add(dateKey);
                } else if (note.folderId) {
                    // Custom folder ->open the folder chain up to root
                    let fid = note.folderId;
                    while (fid) {
                        openFolders.add(fid);
                        const f = folderById.get(fid);
                        fid = f ? f.parentId : null;
                    }
                } else {
                    // Temporal note -> open month + date folders
                    const d = new Date(note.timestamp);
                    const dateKey = d.toLocaleDateString('en-CA');
                    openFolders.add(getMonthKey(dateKey));
                    openFolders.add(dateKey);
                }

                renderSidebar();
                editor.focus();
                updateWordCount();
            }
        }

        // --- Incremental Save System ---
        // Notes are stored individually: imminote_n_{id} = content string
        // Manifest stores metadata only: imminote_manifest = [{id, timestamp, customTitle, isBookmarked, folderId, anchoredDateKey, anchorOriginFolderId}, ...]

        function saveNoteContent(note) {
            localStorage.setItem('imminote_n_' + note.id, note.content);
        }

        function removeNoteStorage(noteId) {
            localStorage.removeItem('imminote_n_' + noteId);
        }

        function saveManifest() {
            const manifest = notes.map(n => ({
                id: n.id,
                timestamp: n.timestamp,
                customTitle: n.customTitle,
                isBookmarked: n.isBookmarked,
                folderId: n.folderId,
                anchoredDateKey: n.anchoredDateKey,
                anchorOriginFolderId: n.anchorOriginFolderId
            }));
            localStorage.setItem('imminote_manifest', JSON.stringify(manifest));
        }

        function saveMetadata() {
            saveManifest();
            localStorage.setItem('imminote_aliases', JSON.stringify(folderAliases));
            localStorage.setItem('imminote_folders', JSON.stringify(folders));
        }

        function saveData() {
            // Full save: manifest + aliases + folders (content saved per-note)
            saveMetadata();
        }

        function saveDeletedData() {
            localStorage.setItem('imminote_deleted', JSON.stringify(deletedNotes.map(n => ({
                id: n.id, timestamp: n.timestamp, customTitle: n.customTitle,
                isBookmarked: n.isBookmarked, folderId: n.folderId,
                deletedAt: n.deletedAt
            }))));
            localStorage.setItem('imminote_deleted_folders', JSON.stringify(deletedFolders));
        }

        function purgeExpiredTrash() {
            const cutoff = Date.now() - (14 * 86400000);
            const expired = deletedNotes.filter(n => n.deletedAt < cutoff);
            if (expired.length === 0) return;
            expired.forEach(n => removeNoteStorage(n.id));
            deletedNotes = deletedNotes.filter(n => n.deletedAt >= cutoff);
            cleanupDeletedFolders();
            saveDeletedData();
        }

        function cleanupDeletedFolders() {
            if (deletedFolders.length === 0) return;
            const usedFolderIds = new Set();
            deletedNotes.forEach(n => { if (n.folderId) usedFolderIds.add(n.folderId); });
            const keepFolder = (fId) => {
                if (usedFolderIds.has(fId)) return true;
                return deletedFolders.some(f => f.parentId === fId && keepFolder(f.id));
            };
            deletedFolders = deletedFolders.filter(f => keepFolder(f.id));
        }

        function moveToTrash(notesToTrash, foldersToTrash) {
            const now = Date.now();
            notesToTrash.forEach(n => {
                ensureContentLoaded(n);
                if (n.anchoredDateKey) {
                    n.content = 'anchored note - ' + n.content;
                    saveNoteContent(n);
                    n.anchoredDateKey = null;
                    n.anchorOriginFolderId = null;
                }
                n.deletedAt = now;
                deletedNotes.push(n);
            });
            if (foldersToTrash && foldersToTrash.length > 0) {
                foldersToTrash.forEach(f => {
                    if (!deletedFolders.some(df => df.id === f.id)) {
                        deletedFolders.push({ ...f });
                    }
                });
            }
            saveDeletedData();
        }

        function restoreFromTrash(noteId) {
            const idx = deletedNotes.findIndex(n => n.id === noteId);
            if (idx === -1) return;
            const note = deletedNotes[idx];
            ensureContentLoaded(note);
            delete note.deletedAt;
            notes.push(note);
            notes.sort((a, b) => b.timestamp - a.timestamp);
            deletedNotes.splice(idx, 1);
            cleanupDeletedFolders();
            if (note.folderId && !note.folderId.startsWith('date:') && !folderById.has(note.folderId)) {
                const df = deletedFolders.find(f => f.id === note.folderId);
                if (df) {
                    restoreDeletedFolderChain(df);
                } else {
                    note.folderId = null;
                }
            }
            saveNoteContent(note);
            saveData();
            saveDeletedData();
            rebuildIndexes();
            renderSidebar();
            renderTrash();
        }

        function restoreDeletedFolderChain(folder) {
            if (folder.parentId) {
                const parent = deletedFolders.find(f => f.id === folder.parentId);
                if (parent && !folderById.has(parent.id) && !folders.some(f => f.id === parent.id)) {
                    restoreDeletedFolderChain(parent);
                }
            }
            if (!folders.some(f => f.id === folder.id)) {
                folders.push({ ...folder });
            }
            deletedFolders = deletedFolders.filter(f => f.id !== folder.id);
        }

        function permanentDeleteFromTrash(type, id) {
            if (type === 'file') {
                deletedNotes = deletedNotes.filter(n => n.id !== id);
                removeNoteStorage(id);
            } else if (type === 'folder') {
                const folderIds = new Set();
                const collectTrashFolders = (fid) => {
                    folderIds.add(fid);
                    deletedFolders.filter(f => f.parentId === fid).forEach(f => collectTrashFolders(f.id));
                };
                collectTrashFolders(id);
                deletedNotes.filter(n => n.folderId && folderIds.has(n.folderId)).forEach(n => removeNoteStorage(n.id));
                deletedNotes = deletedNotes.filter(n => !n.folderId || !folderIds.has(n.folderId));
                deletedFolders = deletedFolders.filter(f => !folderIds.has(f.id));
            }
            cleanupDeletedFolders();
            saveDeletedData();
            renderTrash();
        }

        function emptyAllTrash() {
            deletedNotes.forEach(n => removeNoteStorage(n.id));
            deletedNotes = [];
            deletedFolders = [];
            saveDeletedData();
            renderTrash();
        }

        function ensureContentLoaded(note) {
            if (!note._contentLoaded) {
                note.content = localStorage.getItem('imminote_n_' + note.id) || '';
                note._contentLoaded = true;
            }
        }

        function ensureAllContentLoaded() {
            notes.forEach(n => ensureContentLoaded(n));
        }

        function migrateToPerNoteStorage() {
            // One-time migration from monolithic imminote_notes_v2 to per-note keys + manifest
            notes.forEach(note => {
                localStorage.setItem('imminote_n_' + note.id, note.content);
                note._contentLoaded = true;
            });
            saveManifest();
            localStorage.removeItem('imminote_notes_v2');
        }

        function rebuildIndexes() {
            noteById = new Map();
            notesByDate = new Map();
            notesByMonth = new Map();
            notesByFolderId = new Map();
            notesByDateDirect = new Map();
            folderById = new Map();
            childFolders = new Map();

            function _trackMonth(dateKey) {
                const mk = getMonthKey(dateKey);
                if (!notesByMonth.has(mk)) notesByMonth.set(mk, new Set());
                notesByMonth.get(mk).add(dateKey);
            }

            notes.forEach(note => {
                noteById.set(note.id, note);
                if (note.folderId && note.folderId.startsWith('date:')) {
                    const dateKey = note.folderId.substring(5);
                    if (!notesByDate.has(dateKey)) notesByDate.set(dateKey, []);
                    notesByDate.get(dateKey).push(note);
                    if (!notesByDateDirect.has(dateKey)) notesByDateDirect.set(dateKey, []);
                    notesByDateDirect.get(dateKey).push(note);
                    _trackMonth(dateKey);
                } else if (note.folderId) {
                    if (!notesByFolderId.has(note.folderId)) notesByFolderId.set(note.folderId, []);
                    notesByFolderId.get(note.folderId).push(note);
                } else {
                    const d = new Date(note.timestamp);
                    const dateKey = d.toLocaleDateString('en-CA');
                    if (!notesByDate.has(dateKey)) notesByDate.set(dateKey, []);
                    notesByDate.get(dateKey).push(note);
                    _trackMonth(dateKey);
                }
            });

            folders.forEach(folder => {
                folderById.set(folder.id, folder);
                const pid = folder.parentId || '__root__';
                if (!childFolders.has(pid)) childFolders.set(pid, []);
                childFolders.get(pid).push(folder);
            });
        }

        // --- Incremental Index Helpers ---
        function _mapPush(map, key, item) {
            if (!map.has(key)) map.set(key, []);
            map.get(key).push(item);
        }

        function _mapRemove(map, key, itemId) {
            const arr = map.get(key);
            if (!arr) return;
            const idx = arr.findIndex(x => x.id === itemId);
            if (idx !== -1) arr.splice(idx, 1);
            if (arr.length === 0) map.delete(key);
        }

        function _indexNoteIntoGroups(note) {
            if (note.folderId && note.folderId.startsWith('date:')) {
                const dateKey = note.folderId.substring(5);
                _mapPush(notesByDate, dateKey, note);
                _mapPush(notesByDateDirect, dateKey, note);
                const mk = getMonthKey(dateKey);
                if (!notesByMonth.has(mk)) notesByMonth.set(mk, new Set());
                notesByMonth.get(mk).add(dateKey);
            } else if (note.folderId) {
                _mapPush(notesByFolderId, note.folderId, note);
            } else {
                const d = new Date(note.timestamp);
                const dateKey = d.toLocaleDateString('en-CA');
                _mapPush(notesByDate, dateKey, note);
                const mk = getMonthKey(dateKey);
                if (!notesByMonth.has(mk)) notesByMonth.set(mk, new Set());
                notesByMonth.get(mk).add(dateKey);
            }
        }

        function _removeNoteFromGroups(note) {
            if (note.folderId && note.folderId.startsWith('date:')) {
                const dateKey = note.folderId.substring(5);
                _mapRemove(notesByDate, dateKey, note.id);
                _mapRemove(notesByDateDirect, dateKey, note.id);
            } else if (note.folderId) {
                _mapRemove(notesByFolderId, note.folderId, note.id);
            } else {
                const d = new Date(note.timestamp);
                const dateKey = d.toLocaleDateString('en-CA');
                _mapRemove(notesByDate, dateKey, note.id);
                // Clean up month tracking if dateKey is now empty
                if (!notesByDate.has(dateKey) || notesByDate.get(dateKey).length === 0) {
                    notesByDate.delete(dateKey);
                    const mk = getMonthKey(dateKey);
                    const s = notesByMonth.get(mk);
                    if (s) { s.delete(dateKey); if (s.size === 0) notesByMonth.delete(mk); }
                }
            }
        }

        function indexAdd(note) {
            noteById.set(note.id, note);
            _indexNoteIntoGroups(note);
        }

        function indexRemove(note) {
            noteById.delete(note.id);
            _removeNoteFromGroups(note);
        }

        function indexUpdate(note, oldFolderId, oldTimestamp) {
            if (oldFolderId !== note.folderId || oldTimestamp !== note.timestamp) {
                _removeNoteFromGroups({ ...note, folderId: oldFolderId, timestamp: oldTimestamp, id: note.id });
                _indexNoteIntoGroups(note);
            }
        }

        function indexAddFolder(folder) {
            folderById.set(folder.id, folder);
            const pid = folder.parentId || '__root__';
            _mapPush(childFolders, pid, folder);
        }

        function indexRemoveFolder(folder) {
            folderById.delete(folder.id);
            const pid = folder.parentId || '__root__';
            _mapRemove(childFolders, pid, folder.id);
        }

        // --- Long-press for mobile context menu ---
        function attachLongPress(el, callback, delay = 500) {
            let timer = null;
            let didLongPress = false;
            el.addEventListener('touchstart', (e) => {
                didLongPress = false;
                timer = setTimeout(() => {
                    didLongPress = true;
                    // Synthesize position from touch point for menu placement
                    const touch = e.touches[0];
                    const synth = { target: el, stopPropagation() {}, preventDefault() {},
                        getBoundingClientRect: () => ({ top: touch.clientY, bottom: touch.clientY, left: touch.clientX, right: touch.clientX }) };
                    // Use the touch target for getBoundingClientRect in showContextMenu
                    callback(synth);
                }, delay);
            }, { passive: true });
            el.addEventListener('touchmove', () => {
                clearTimeout(timer);
            }, { passive: true });
            el.addEventListener('touchend', (e) => {
                clearTimeout(timer);
                if (didLongPress) {
                    e.preventDefault(); // prevent click after long-press
                    didLongPress = false;
                }
            });
        }

        // --- Context Menu Logic ---
        function showContextMenu(e, type, id, isTrash) {
            e.stopPropagation();
            e.preventDefault();

            const ctxSaveAs = document.getElementById('ctxSaveAs');
            const ctxNewFolder = document.getElementById('ctxNewFolder');
            const ctxNewNote = document.getElementById('ctxNewNote');
            const ctxRestore = document.getElementById('ctxRestore');
            const ctxRename = document.getElementById('ctxRename');
            const ctxDivider = document.getElementById('ctxDivider');
            const ctxFavorite = document.getElementById('ctxFavorite');
            const ctxFavoriteLabel = document.getElementById('ctxFavoriteLabel');
            const ctxMove = document.getElementById('ctxMove');

            // Hide all optional items first
            if (ctxAnchor) ctxAnchor.style.display = 'none';
            ctxSaveAs.style.display = 'none';
            ctxNewFolder.style.display = 'none';
            ctxNewNote.style.display = 'none';
            ctxRestore.style.display = 'none';
            ctxRename.style.display = 'none';
            ctxFavorite.style.display = 'none';
            ctxMove.style.display = 'none';
            ctxDivider.style.display = '';

            if (isTrash) {
                // Trash items: only show restore + delete
                ctxRestore.style.display = 'flex';
                ctxDivider.style.display = 'none';
            } else if (type === 'file') {
                ctxSaveAs.style.display = 'flex';
                ctxRename.style.display = 'flex';
                const note = noteById.get(id);
                // Favorite
                ctxFavorite.style.display = 'flex';
                if (note) ctxFavoriteLabel.textContent = note.isBookmarked ? 'unfavorite' : 'favorite';
                // Anchor
                if (ctxAnchor && note && canAnchorNote(note)) {
                    ctxAnchor.style.display = 'flex';
                    if (ctxAnchorLabel) {
                        ctxAnchorLabel.textContent = isAnchoredNote(note) ? 'unanchor note' : 'anchor note';
                    }
                }
                // Move (mobile only, non-anchored)
                if (isMobileDevice && note && !isAnchoredNote(note)) {
                    ctxMove.style.display = 'flex';
                }
            } else if (type === 'folder') {
                ctxRename.style.display = 'flex';
                // Favorite
                ctxFavorite.style.display = 'flex';
                const folder = folderById.get(id);
                if (folder) {
                    ctxFavoriteLabel.textContent = folder.isBookmarked ? 'unfavorite' : 'favorite';
                } else {
                    // Temporal folder — check if all notes in it are bookmarked
                    const folderNotes = getNotesInFolder(id);
                    const allBookmarked = folderNotes.length > 0 && folderNotes.every(n => n.isBookmarked);
                    ctxFavoriteLabel.textContent = allBookmarked ? 'unfavorite' : 'favorite';
                }
                if (folderById.has(id)) {
                    ctxNewFolder.style.display = 'flex';
                    ctxNewNote.style.display = 'flex';
                    // Move (mobile only, custom folders)
                    if (isMobileDevice) ctxMove.style.display = 'flex';
                } else {
                    // Month or day temporal folder
                    ctxNewNote.style.display = 'flex';
                }
            }
            const rect = e.target.getBoundingClientRect();

            // Show off-screen to measure dimensions
            contextMenu.style.top = '-9999px';
            contextMenu.style.left = '-9999px';
            contextMenu.classList.add('show');

            const menuRect = contextMenu.getBoundingClientRect();
            const viewportW = window.innerWidth;
            const viewportH = window.innerHeight;

            let top = rect.bottom;
            let left = rect.left;

            if (top + menuRect.height > viewportH) top = rect.top - menuRect.height;
            if (left + menuRect.width > viewportW) left = rect.right - menuRect.width;

            top = Math.max(0, Math.min(top, viewportH - menuRect.height));
            left = Math.max(0, Math.min(left, viewportW - menuRect.width));

            contextMenu.style.top = `${top}px`;
            contextMenu.style.left = `${left}px`;
            contextTarget = { type, id, isTrash: !!isTrash };
        }

        // --- Features Handlers ---
        document.getElementById('ctxSaveAs').onclick = () => {
            if (!contextTarget || contextTarget.type !== 'file') return;
            const note = noteById.get(contextTarget.id);
            if (note) {
                ensureContentLoaded(note);
                const date = new Date(note.timestamp);
                const dateStr = date.toLocaleDateString('en-CA');
                const timeStr = date.toLocaleTimeString('en-GB').replace(/:/g, '-');
                let titleSlug = getNoteTitle(note).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const filename = `${dateStr}_${timeStr}_${titleSlug}.txt`;

                const blob = new Blob([note.content], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                window.URL.revokeObjectURL(url);
            }

        document.getElementById('ctxNewFolder').onclick = () => {
            if (!contextTarget) return;

            const newFolder = {
                id: generateId(),
                name: "New Folder",
                parentId: null,
                type: 'custom',
                sortOrder: Date.now(),
                isBookmarked: false
            };

            // If right-clicked on a custom folder, nest inside it
            if (contextTarget.type === 'folder' && folderById.has(contextTarget.id)) {
                newFolder.parentId = contextTarget.id;
            }
            // For temporal folders or files, create at root level (parentId stays null)

            folders.push(newFolder);

        document.getElementById('ctxNewNote').onclick = () => {
            if (!contextTarget || contextTarget.type !== 'folder') return;
            const targetId = contextTarget.id;

            if (folderById.has(targetId)) {
                addNoteToFolder(targetId, 'custom');
            } else {
                // Month or day temporal folder — create date-level note
                addNoteToFolder(targetId.length === 7 ? new Date().toLocaleDateString('en-CA') : targetId, 'date');
            }
            contextMenu.classList.remove('show');
        };

        if (ctxAnchor) {
            ctxAnchor.onclick = () => {
                if (!contextTarget || contextTarget.type !== 'file') return;

                renderSidebar();

        document.getElementById('ctxFavorite').onclick = () => {
            if (!contextTarget || contextTarget.isTrash) return;
            const { type, id } = contextTarget;
            if (type === 'file') {
                const note = noteById.get(id);
                if (note) note.isBookmarked = !note.isBookmarked;
            } else {
                // Folder — toggle all notes + folder itself
                const folderNotes = getNotesInFolder(id);
                const anyUnbookmarked = folderNotes.some(n => !n.isBookmarked);
                folderNotes.forEach(n => n.isBookmarked = anyUnbookmarked);
                if (folderById.has(id)) {
                    const folder = folderById.get(id);
                    folder.isBookmarked = anyUnbookmarked;
                }
            }
            saveData();
            renderSidebar();
            contextMenu.classList.remove('show');
        };

        document.getElementById('ctxMove').onclick = () => {
            if (!contextTarget || contextTarget.isTrash) return;
            const { type, id } = contextTarget;
            contextMenu.classList.remove('show');

            if (type === 'file') {
                const note = noteById.get(id);
                if (!note || isAnchoredNote(note)) return;
                const noteIds = selectedNoteIds.has(id) && selectedNoteIds.size > 1
                    ? [...selectedNoteIds].filter(nid => { const n = noteById.get(nid); return n && !isAnchoredNote(n); })
                    : [id];
                moveMode = { type: 'note', noteIds };
                highlightDropTargets('note');
            } else if (type === 'folder' && folderById.has(id)) {
                moveMode = { type: 'customFolder', folderId: id };
                highlightDropTargets('customFolder');
            }
            if (moveMode) {
                document.addEventListener('click', moveModeClickHandler, { capture: true });
                document.addEventListener('keydown', moveModeCancelHandler);
            }
        };

        function moveModeClickHandler(e) {
            const target = e.target.closest('.drop-target');
            if (target) {
                e.stopPropagation();
                e.preventDefault();
                const targetId = target.getAttribute('data-folder-id');
                const targetType = target.getAttribute('data-drop-type');
                if (targetId && targetType && moveMode) {
                    handleDrop(
                        moveMode.type === 'note'
                            ? { type: 'note', noteId: moveMode.noteIds[0], noteIds: moveMode.noteIds }
                            : { type: 'customFolder', folderId: moveMode.folderId },
                        targetId, targetType
                    );
                }
            }
            exitMoveMode();
        }

        function moveModeCancelHandler(e) {
            if (e.key === 'Escape') exitMoveMode();
        }

        function exitMoveMode() {
            moveMode = null;
            clearDropTargets();
            document.removeEventListener('click', moveModeClickHandler, { capture: true });
            document.removeEventListener('keydown', moveModeCancelHandler);
        }

        // --- Standard Handlers ---

        document.getElementById('ctxDelete').onclick = () => {
            if (!contextTarget) return;
            const { type, id, isTrash } = contextTarget;
            if (isTrash) {
                permanentDeleteFromTrash(type === 'file' ? 'file' : 'folder', id);
